<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You & Emily · Finance</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F0E8; font-family: 'DM Mono', monospace; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px) } to { opacity:1; transform:translateY(0) } }
    @keyframes spin   { from { transform:rotate(0deg) } to { transform:rotate(360deg) } }
    .card { animation: fadeUp 0.4s ease both; }
    .tx-row:hover { background: rgba(255,255,255,0.5) !important; }
    input::-webkit-inner-spin-button { -webkit-appearance:none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    const PROXY_URL = "https://splitwise-proxy.onrender.com";

    const CATEGORIES = [
      { id:"groceries",     label:"Groceries & Dining",            icon:"🛒", color:"#6B8F71", budget:800  },
      { id:"transport",     label:"Travel & Transport",            icon:"✈️", color:"#8B7355", budget:400  },
      { id:"entertainment", label:"Entertainment & Subscriptions", icon:"🎬", color:"#7A6B8A", budget:200  },
      { id:"rent",          label:"Rent & Utilities",              icon:"🏠", color:"#4A7C8E", budget:2200 },
      { id:"savings",       label:"Savings & Investments",         icon:"📈", color:"#2D5A3D", budget:1000 },
      { id:"shopping",      label:"Personal Shopping",             icon:"🛍️", color:"#A0785A", budget:300  },
    ];

    const SAMPLE = [
      { id:1,  desc:"Whole Foods Market", amount:127.43, adjustedAmount:null, category:"groceries",     date:"2025-03-01", person:"Joint", splitwiseId:null },
      { id:2,  desc:"Monthly Rent",       amount:2100,   adjustedAmount:null, category:"rent",          date:"2025-03-01", person:"Joint", splitwiseId:null },
      { id:3,  desc:"Netflix + Spotify",  amount:28.97,  adjustedAmount:null, category:"entertainment", date:"2025-03-02", person:"Emily", splitwiseId:null },
      { id:4,  desc:"Dinner for 4",       amount:240,    adjustedAmount:60,   category:"groceries",     date:"2025-03-03", person:"You",   splitwiseId:"sw-demo-1" },
      { id:5,  desc:"Electricity Bill",   amount:98.20,  adjustedAmount:null, category:"rent",          date:"2025-03-04", person:"Joint", splitwiseId:null },
      { id:6,  desc:"Zara",               amount:89.95,  adjustedAmount:null, category:"shopping",      date:"2025-03-05", person:"Emily", splitwiseId:null },
      { id:7,  desc:"Deliveroo",          amount:38.60,  adjustedAmount:null, category:"groceries",     date:"2025-03-06", person:"You",   splitwiseId:null },
      { id:8,  desc:"Vanguard 401k",      amount:500,    adjustedAmount:null, category:"savings",       date:"2025-03-07", person:"Joint", splitwiseId:null },
      { id:9,  desc:"Weekend trip hotel", amount:380,    adjustedAmount:95,   category:"transport",     date:"2025-03-08", person:"Emily", splitwiseId:"sw-demo-2" },
      { id:10, desc:"Uber",               amount:19.80,  adjustedAmount:null, category:"transport",     date:"2025-03-09", person:"Emily", splitwiseId:null },
      { id:11, desc:"Movie night for 3",  amount:94.50,  adjustedAmount:31.5, category:"entertainment", date:"2025-03-10", person:"You",   splitwiseId:"sw-demo-3" },
      { id:12, desc:"Whole Foods",        amount:94.20,  adjustedAmount:null, category:"groceries",     date:"2025-03-11", person:"Joint", splitwiseId:null },
      { id:13, desc:"Amazon Prime",       amount:8.99,   adjustedAmount:null, category:"entertainment", date:"2025-03-12", person:"Joint", splitwiseId:null },
      { id:14, desc:"ASOS",               amount:145,    adjustedAmount:null, category:"shopping",      date:"2025-03-13", person:"You",   splitwiseId:null },
      { id:15, desc:"TfL Monthly",        amount:172,    adjustedAmount:null, category:"transport",     date:"2025-03-14", person:"You",   splitwiseId:null },
    ];

    // ── TIME HELPERS ───────────────────────────────────────────────────────────
    const now = new Date();
    const MONTH_OPTIONS = Array.from({ length: 12 }, (_, i) => {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      return { value: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`, label: d.toLocaleString("en-US", { month:"long", year:"numeric" }) };
    });
    const CURRENT_MONTH = MONTH_OPTIONS[0].value;

    // ── SPLITWISE ──────────────────────────────────────────────────────────────
    async function fetchSplitwise(apiKey, yourUserId, monthValue) {
      // monthValue format: "2026-03" — fetch entire month
      const [year, mon] = monthValue.split("-").map(Number);
      const datedAfter  = `${year}-${String(mon).padStart(2,"0")}-01`;
      const lastDay     = new Date(year, mon, 0).getDate();
      const datedBefore = `${year}-${String(mon).padStart(2,"0")}-${lastDay}`;
      const res = await fetch(`${PROXY_URL}/splitwise/get_expenses?limit=100&dated_after=${datedAfter}&dated_before=${datedBefore}`, {
        headers: { "x-splitwise-key": apiKey }
      });
      if (!res.ok) throw new Error(`Status ${res.status}`);
      const data = await res.json();
      return (data.expenses || [])
        .filter(e => !e.payment && !e.deleted_at)
        .map(e => {
          const me = (e.users || []).find(u => u.user_id === yourUserId);
          return {
            id: e.id,
            description: e.description,
            date: (e.date || "").split("T")[0],
            totalCost: parseFloat(e.cost) || 0,
            yourShare: parseFloat(me && me.owed_share) || 0,
            paidByYou: parseFloat(me && me.paid_share) > 0,
          };
        })
        .filter(e => e.yourShare > 0);
    }

    function matchAndAdjust(transactions, sw) {
      if (!sw.length) return transactions;
      return transactions.map(tx => {
        const match = sw.find(s => {
          const diff = Math.abs((new Date(s.date) - new Date(tx.date)) / 86400000);
          return Math.abs(s.totalCost - tx.amount) < 1.0 && diff <= 3;
        });
        return match ? { ...tx, adjustedAmount: match.yourShare, splitwiseId: `sw-${match.id}` } : tx;
      });
    }

    // ── PARSING ────────────────────────────────────────────────────────────────
    function guessCategory(desc) {
      const d = desc.toLowerCase();
      if (/grocery|whole foods|trader joe|kroger|safeway|restaurant|cafe|coffee|pizza|burger|sushi|doordash|ubereats|grubhub|deliveroo|starbucks|chipotle|mcdonald/.test(d)) return "groceries";
      if (/netflix|spotify|hulu|disney|hbo|apple tv|amazon prime|cinema|movie|theater|gaming|steam/.test(d)) return "entertainment";
      if (/uber|lyft|taxi|metro|subway|train|flight|airline|delta|united|southwest|airbnb|hotel|parking|gas station|shell/.test(d)) return "transport";
      if (/rent|mortgage|electricity|electric|gas bill|water|internet|broadband|utility|insurance/.test(d)) return "rent";
      if (/vanguard|fidelity|schwab|401k|ira|invest|stock|etf|savings/.test(d)) return "savings";
      if (/amazon|asos|zara|h&m|gap|nike|apple store|best buy|walmart|shopping|clothes/.test(d)) return "shopping";
      return "groceries";
    }

    function parseCSV(text) {
      const lines = text.trim().split("\n");
      const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
      return lines.slice(1).map((line, i) => {
        const vals = line.split(",").map(v => v.trim().replace(/^"|"$/g, ""));
        const obj = {};
        headers.forEach((h, idx) => obj[h] = vals[idx]);
        const amount = parseFloat(obj.amount || obj.debit || obj.credit || 0);
        const desc = obj.description || obj.desc || obj.merchant || obj.narrative || "Unknown";
        const date = obj.date || new Date().toISOString().split("T")[0];
        return { id: Date.now() + i, desc, amount: Math.abs(amount), adjustedAmount: null, category: guessCategory(desc), date, person: "Imported", splitwiseId: null };
      }).filter(t => t.amount > 0);
    }

    function SpendBar({ spent, budget, color, filterPerson, meSpent, emilySpent, meColor, otherColor }) {
      const MC = meColor    || "#4A7C8E";
      const OC = otherColor || "#A0785A";
      const over = spent > budget;

      if (filterPerson === "Joint" || filterPerson === "All") {
        const mePct = budget > 0 ? Math.min(((meSpent    || 0) / budget) * 100, 100) : 0;
        const emPct = budget > 0 ? Math.min(((emilySpent || 0) / budget) * 100, 100 - mePct) : 0;
        return (
          <div style={{ background:"#E8E0D4", borderRadius:99, height:7, overflow:"hidden", marginTop:6, display:"flex" }}>
            <div style={{ height:"100%", width:`${mePct}%`, background: over ? "#C0392B" : MC, transition:"width 0.8s cubic-bezier(.4,0,.2,1)", borderRadius: emPct > 0 ? "99px 0 0 99px" : 99 }} />
            <div style={{ height:"100%", width:`${emPct}%`, background: over ? "#E05050" : OC, transition:"width 0.8s cubic-bezier(.4,0,.2,1)", borderRadius: mePct > 0 ? "0 99px 99px 0" : 99 }} />
          </div>
        );
      }
      if (filterPerson === "Me") {
        const pct = Math.min((spent / budget) * 100, 100);
        return (
          <div style={{ background:"#E8E0D4", borderRadius:99, height:7, overflow:"hidden", marginTop:6 }}>
            <div style={{ height:"100%", borderRadius:99, width:`${pct}%`, background: over ? "#C0392B" : MC, transition:"width 0.8s cubic-bezier(.4,0,.2,1)" }} />
          </div>
        );
      }
      // Named other person or default
      const isOther = filterPerson && filterPerson !== "All" && filterPerson !== "Me" && filterPerson !== "Joint";
      const barColor = isOther ? OC : color;
      const pct = Math.min((spent / budget) * 100, 100);
      return (
        <div style={{ background:"#E8E0D4", borderRadius:99, height:7, overflow:"hidden", marginTop:6 }}>
          <div style={{ height:"100%", borderRadius:99, width:`${pct}%`, background: over ? "#C0392B" : barColor, transition:"width 0.8s cubic-bezier(.4,0,.2,1)" }} />
        </div>
      );
    }

    function Badge({ tx }) {
      if (!tx.splitwiseId) return null;
      const saved = (tx.amount - (tx.adjustedAmount != null ? tx.adjustedAmount : tx.amount)).toFixed(2);
      return (
        <span style={{ display:"inline-flex", alignItems:"center", gap:4, background:"#EAF4ED", color:"#2D5A3D", borderRadius:99, fontSize:9, padding:"2px 7px", fontWeight:500, marginTop:3 }}>
          ⚡ Splitwise · saved ${saved}
        </span>
      );
    }

    function SplitwisePanel({ apiKey, setApiKey, yourId, setYourId, emilyId, setEmilyId, onSync, syncing, syncStatus, filteredTx, totalRaw, totalSpent, totalSaved }) {
      const [open, setOpen] = useState(false);
      const configured = apiKey && yourId;
      const adjusted = filteredTx.filter(t => t.splitwiseId);
      return (
        <div className="card">
          <div onClick={() => setOpen(o => !o)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background: configured ? "#EAF4ED" : "#FDF5EC", border:`1.5px solid ${configured ? "#A8D5B5" : "#E8C87A"}`, borderRadius: open ? "14px 14px 0 0" : 14, padding:"14px 16px", cursor:"pointer" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:20 }}>⚡</span>
              <div>
                <div style={{ fontSize:12, color:"#2A2219", fontWeight:500 }}>Splitwise Integration</div>
                <div style={{ fontSize:10, color: configured ? "#2D5A3D" : "#8A6A2A" }}>{configured ? "Connected · tap to manage" : "Not configured · tap to set up"}</div>
              </div>
            </div>
            <span style={{ fontSize:13, color:"#9E907A" }}>{open ? "▲" : "▼"}</span>
          </div>
          {open && (
            <div style={{ background:"rgba(255,255,255,0.7)", borderRadius:"0 0 14px 14px", border:"1.5px solid #D5CAB8", borderTop:"none", padding:"16px", marginBottom:16 }}>
              <div style={{ fontSize:11, color:"#6B5E4A", lineHeight:1.7, marginBottom:14 }}>Enter your Splitwise credentials to auto-adjust shared expenses.</div>
              {[
                { label:"API KEY",         val:apiKey,  set:setApiKey,                              ph:"paste your API key..." },
                { label:"YOUR USER ID",    val:yourId,  set:v => setYourId(v ? parseInt(v) : null),  ph:"e.g. 12345678" },
                { label:"EMILY'S USER ID", val:emilyId, set:v => setEmilyId(v ? parseInt(v) : null), ph:"e.g. 87654321 (optional)" },
              ].map(f => (
                <div key={f.label} style={{ marginBottom:12 }}>
                  <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.1em", marginBottom:4 }}>{f.label}</div>
                  <input value={f.val || ""} onChange={e => f.set(e.target.value)} placeholder={f.ph}
                    style={{ width:"100%", padding:"8px 12px", borderRadius:8, border:"1.5px solid #D5CAB8", background:"#FAF7F2", fontFamily:"'DM Mono',monospace", fontSize:11, color:"#2A2219", outline:"none" }} />
                </div>
              ))}
              <button onClick={onSync} disabled={syncing || !apiKey || !yourId}
                style={{ width:"100%", padding:"10px", borderRadius:10, border:"none", background: syncing ? "#9AB5A0" : "#2D5A3D", color:"#F5F0E8", fontFamily:"'DM Mono',monospace", fontSize:11, cursor: syncing ? "not-allowed" : "pointer", letterSpacing:"0.08em" }}>
                {syncing ? "⟳ Syncing..." : "⚡ Sync Splitwise Now"}
              </button>
              {syncStatus && <div style={{ marginTop:10, fontSize:11, color: syncStatus.startsWith("✓") ? "#2D5A3D" : "#C0392B", textAlign:"center" }}>{syncStatus}</div>}
            </div>
          )}
          <div style={{ background:"rgba(255,255,255,0.55)", borderRadius:16, padding:"18px 20px", border:"1.5px solid rgba(255,255,255,0.6)", marginBottom:14, marginTop:14 }}>
            <div style={{ fontSize:11, color:"#8A7A68", letterSpacing:"0.08em", marginBottom:14 }}>THIS MONTH'S ADJUSTMENTS</div>
            {adjusted.length === 0 ? (
              <div style={{ fontSize:12, color:"#9E907A", textAlign:"center", padding:"16px 0", lineHeight:1.8 }}>
                No adjustments yet.<br /><span style={{ fontSize:10 }}>Connect above, then sync.</span>
              </div>
            ) : adjusted.map((tx, i) => (
              <div key={tx.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", padding:"10px 0", borderBottom: i < adjusted.length-1 ? "1px solid rgba(200,191,176,0.4)" : "none" }}>
                <div>
                  <div style={{ fontSize:12, color:"#2A2219" }}>{tx.desc}</div>
                  <div style={{ fontSize:10, color:"#9E907A", marginTop:2 }}>{tx.date} · {tx.person}</div>
                  <Badge tx={tx} />
                </div>
                <div style={{ textAlign:"right", flexShrink:0, marginLeft:12 }}>
                  <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:18, color:"#2A2219" }}>${(tx.adjustedAmount != null ? tx.adjustedAmount : tx.amount).toFixed(2)}</div>
                  <div style={{ fontSize:10, color:"#9E907A", textDecoration:"line-through" }}>${tx.amount.toFixed(2)}</div>
                </div>
              </div>
            ))}
          </div>
          {adjusted.length > 0 && (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              {[
                { label:"RAW BANK SPEND",    val:`$${totalRaw.toFixed(2)}`,   sub:"from statements" },
                { label:"YOUR ACTUAL SHARE", val:`$${totalSpent.toFixed(2)}`, sub:`$${totalSaved.toFixed(2)} offset` },
              ].map(s => (
                <div key={s.label} style={{ background:"rgba(255,255,255,0.55)", borderRadius:14, padding:"14px", border:"1.5px solid rgba(255,255,255,0.6)" }}>
                  <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.08em", marginBottom:6 }}>{s.label}</div>
                  <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:20, color:"#2A2219" }}>{s.val}</div>
                  <div style={{ fontSize:10, color:"#6B5E4A", marginTop:2 }}>{s.sub}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function AddTransactionModal({ onAdd, onClose }) {
      const today = new Date().toISOString().split("T")[0];
      const [desc,     setDesc]     = useState("");
      const [amount,   setAmount]   = useState("");
      const [category, setCategory] = useState("groceries");
      const [person,   setPerson]   = useState("You");
      const [date,     setDate]     = useState(today);

      const save = () => {
        const parsed = parseFloat(amount);
        if (!desc.trim() || isNaN(parsed) || parsed <= 0) return;
        onAdd({
          id: Date.now(),
          desc: desc.trim(),
          amount: parsed,
          adjustedAmount: null,
          category, person, date,
          splitwiseId: null,
          manualEdit: true,
          manualEntry: true,
        });
        onClose();
      };

      return (
        <div style={{ position:"fixed", inset:0, zIndex:999, display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
          <div onClick={onClose} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.35)" }} />
          <div style={{ position:"relative", width:"100%", maxWidth:480, background:"#FAF7F2", borderRadius:"20px 20px 0 0", padding:"24px 24px 40px", boxShadow:"0 -8px 40px rgba(0,0,0,0.15)", maxHeight:"90vh", overflowY:"auto" }}>
            <div style={{ width:36, height:4, background:"#D5CAB8", borderRadius:99, margin:"0 auto 20px" }} />
            <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:18, color:"#2A2219", marginBottom:20 }}>Add Transaction</div>

            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.1em", marginBottom:5 }}>DESCRIPTION</div>
              <input value={desc} onChange={e => setDesc(e.target.value)} placeholder="e.g. Farmers market cash"
                style={{ width:"100%", padding:"9px 12px", borderRadius:9, border:"1.5px solid #D5CAB8", background:"#fff", fontFamily:"'DM Mono',monospace", fontSize:12, color:"#2A2219", outline:"none" }} />
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14 }}>
              <div>
                <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.1em", marginBottom:5 }}>AMOUNT ($)</div>
                <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.00" step="0.01" min="0"
                  style={{ width:"100%", padding:"9px 12px", borderRadius:9, border:"1.5px solid #D5CAB8", background:"#fff", fontFamily:"'DM Mono',monospace", fontSize:12, color:"#2A2219", outline:"none" }} />
              </div>
              <div>
                <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.1em", marginBottom:5 }}>DATE</div>
                <input type="date" value={date} onChange={e => setDate(e.target.value)}
                  style={{ width:"100%", padding:"9px 12px", borderRadius:9, border:"1.5px solid #D5CAB8", background:"#fff", fontFamily:"'DM Mono',monospace", fontSize:11, color:"#2A2219", outline:"none" }} />
              </div>
            </div>

            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.1em", marginBottom:5 }}>CATEGORY</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                {CATEGORIES.map(c => (
                  <button key={c.id} onClick={() => setCategory(c.id)} style={{ padding:"8px 4px", borderRadius:10, border:`1.5px solid ${category===c.id ? c.color : "#D5CAB8"}`, background: category===c.id ? c.color+"18" : "#fff", cursor:"pointer", textAlign:"center" }}>
                    <div style={{ fontSize:16 }}>{c.icon}</div>
                    <div style={{ fontSize:8, color: category===c.id ? c.color : "#9E907A", marginTop:2 }}>{c.label.split(" ")[0].toUpperCase()}</div>
                  </button>
                ))}
              </div>
            </div>

            <div style={{ marginBottom:22 }}>
              <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.1em", marginBottom:5 }}>ASSIGNED TO</div>
              <div style={{ display:"flex", gap:8 }}>
                {["Me","Emily","Joint"].map(p => (
                  <button key={p} onClick={() => setPerson(p)} style={{ flex:1, padding:"8px", borderRadius:9, border:`1.5px solid ${person===p ? "#2D5A3D" : "#D5CAB8"}`, background: person===p ? "#2D5A3D" : "#fff", color: person===p ? "#F5F0E8" : "#6B5E4A", fontSize:11, cursor:"pointer", fontFamily:"'DM Mono',monospace", transition:"all 0.15s" }}>{p}</button>
                ))}
              </div>
            </div>

            <button onClick={save} style={{ width:"100%", padding:"13px", borderRadius:12, border:"none", background:"#2D5A3D", color:"#F5F0E8", fontFamily:"'DM Mono',monospace", fontSize:12, cursor:"pointer", letterSpacing:"0.08em" }}>
              Add Transaction
            </button>
          </div>
        </div>
      );
    }

    function EditModal({ tx, onSave, onClose }) {
      const [desc,     setDesc]     = useState(tx.desc);
      const [amount,   setAmount]   = useState((tx.adjustedAmount != null ? tx.adjustedAmount : tx.amount).toFixed(2));
      const [category, setCategory] = useState(tx.category);
      const [person,   setPerson]   = useState(tx.person);
      const save = () => {
        const parsed = parseFloat(amount);
        if (isNaN(parsed) || parsed <= 0) return;
        onSave(tx.id, { desc, adjustedAmount: parsed, category, person, manualEdit: true });
        onClose();
      };

      return (
        <div style={{ position:"fixed", inset:0, zIndex:999, display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
          <div onClick={onClose} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.35)" }} />
          <div style={{ position:"relative", width:"100%", maxWidth:480, background:"#FAF7F2", borderRadius:"20px 20px 0 0", padding:"24px 24px 40px", boxShadow:"0 -8px 40px rgba(0,0,0,0.15)" }}>
            {/* Handle */}
            <div style={{ width:36, height:4, background:"#D5CAB8", borderRadius:99, margin:"0 auto 20px" }} />
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
              <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:18, color:"#2A2219" }}>Edit Transaction</div>
              {tx.manualEdit && <span style={{ fontSize:9, background:"#FDF0E0", color:"#8A6A2A", borderRadius:99, padding:"3px 8px" }}>MANUALLY EDITED</span>}
            </div>

            {/* Description */}
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.1em", marginBottom:5 }}>DESCRIPTION</div>
              <input value={desc} onChange={e => setDesc(e.target.value)}

              Save Changes

    }

    function AIAdvisor({ transactions, budgets, categorySpend }) {
      const [advice, setAdvice] = useState("");
      const [loading, setLoading] = useState(false);
      const [open, setOpen] = useState(false);
      const eff = tx => tx.adjustedAmount != null ? tx.adjustedAmount : tx.amount;
      const swSavings = transactions.reduce((s, t) => s + (t.splitwiseId ? (t.amount - eff(t)) : 0), 0);

      const getAdvice = async () => {
        setLoading(true); setOpen(true);
        const totalSpent = transactions.reduce((s, t) => s + eff(t), 0);
        const totalBudget = CATEGORIES.reduce((s, c) => s + (budgets[c.id] || c.budget), 0);
        const summary = CATEGORIES.map(c => {
          const spent = transactions.filter(t => t.category === c.id).reduce((s, t) => s + eff(t), 0);
          return `${c.label}: $${spent.toFixed(2)} of $${budgets[c.id] || c.budget}`;
        }).join("; ");
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
              model:"claude-sonnet-4-20250514", max_tokens:1000,
              system:`You are a warm personal financial advisor for Emily and her partner. All figures are Splitwise-adjusted (real shares). Be specific and practical. American English. Format: overall assessment, 2-3 observations, 1-2 tips. Under 250 words. Human tone.`,
              messages:[{ role:"user", content:`Spent (adjusted): $${totalSpent.toFixed(2)} vs $${totalBudget} budget. Splitwise offset: $${swSavings.toFixed(2)}. Breakdown: ${summary}` }]
            })
          });
          const data = await res.json();
          setAdvice(data.content && data.content.map(b => b.text).join("") || "Unable to get advice right now.");
        } catch(e) { setAdvice("Having trouble connecting. Please try again."); }
        setLoading(false);
      };

      return (
        <div>
          <button onClick={getAdvice} style={{ background:"#2D5A3D", color:"#F5F0E8", border:"none", borderRadius:12, padding:"12px 24px", fontFamily:"'DM Mono',monospace", fontSize:13, cursor:"pointer", letterSpacing:"0.05em", width:"100%", opacity: loading ? 0.7 : 1 }}>
            {loading ? "Consulting your advisor..." : "✦ Ask Your Financial Advisor"}
          </button>
          {open && (
            <div style={{ marginTop:16, background:"#F0EBE1", borderRadius:16, padding:"20px 24px", borderLeft:"3px solid #2D5A3D", fontFamily:"'Crimson Pro',Georgia,serif", fontSize:16, lineHeight:1.7, color:"#2A2219", whiteSpace:"pre-wrap" }}>
              {loading
                ? <div style={{ display:"flex", alignItems:"center", gap:10, color:"#6B5E4A" }}><span style={{ animation:"spin 1s linear infinite", display:"inline-block" }}>◌</span> Reviewing your finances...</div>
                : advice}
            </div>
          )}
        </div>
      );
    }

    const PEOPLE = {
      aldrin: { name:"Aldrin", color:"#4A7C8E" },
      emily:  { name:"Emily",  color:"#A0785A" },
    };

    const DEFAULT_BUDGETS = Object.fromEntries(CATEGORIES.map(c => [c.id, c.budget]));

    // ── WHO ARE YOU SCREEN ─────────────────────────────────────────────────────

    // ── MAIN APP ───────────────────────────────────────────────────────────────
    function App() {
      // Identity — persisted in localStorage
      const [userId, setUserId] = useState(() => {
        try { return localStorage.getItem("finance_user") || null; } catch { return null; }
      });

      const selectUser = (id) => {
        try { localStorage.setItem("finance_user", id); } catch {}
        setUserId(id);
      };

      if (!userId) return <WhoAreYou onSelect={selectUser} />;

      return <AppInner userId={userId} onSwitchUser={() => { try { localStorage.removeItem("finance_user"); } catch {} setUserId(null); }} />;
    }

    function AppInner({ userId, onSwitchUser }) {
      const me    = PEOPLE[userId];
      const other = PEOPLE[userId === "aldrin" ? "emily" : "aldrin"];
      const ME_COLOR    = me.color;
      const OTHER_COLOR = other.color;

      const [transactions, setTransactions] = useState(SAMPLE);
      // Per-person budgets: { aldrin: {groceries: 400, ...}, emily: {groceries: 400, ...} }
      const [budgets, setBudgets] = useState({
        aldrin: { ...DEFAULT_BUDGETS },
        emily:  { ...DEFAULT_BUDGETS },
      });
      const [activeTab, setActiveTab]   = useState("overview");
      const [uploadMsg, setUploadMsg]   = useState("");
      const [editBudget, setEditBudget] = useState(null); // {person, catId}
      const [filterPerson,   setFilterPerson]   = useState("All");
      const [filterMonth,    setFilterMonth]    = useState(CURRENT_MONTH);
      const [filterCategory, setFilterCategory] = useState("all");
      const [apiKey, setApiKey]         = useState("");
      const [yourId, setYourId]         = useState(null);
      const [emilyId, setEmilyId]       = useState(null);
      const [syncing, setSyncing]       = useState(false);
      const [syncStatus, setSyncStatus] = useState("");
      const [swExpenses, setSwExpenses] = useState([]);
      const [editingTx, setEditingTx]   = useState(null);
      const [addingTx,  setAddingTx]    = useState(false);
      const fileRef = useRef();

      // Helper: resolve "Me" in filter to actual person name
      const myName    = me.name;
      const otherName = other.name;

      // Combined budget per category = aldrin + emily
      const combinedBudget = (catId) => (budgets.aldrin[catId] || 0) + (budgets.emily[catId] || 0);
      const totalCombinedBudget = CATEGORIES.reduce((s, c) => s + combinedBudget(c.id), 0);

      // Budget for current viewer's perspective
      const myBudget    = (catId) => budgets[userId][catId] || 0;
      const totalMyBudget = CATEGORIES.reduce((s, c) => s + myBudget(c.id), 0);

      const updateBudget = (personId, catId, val) => {
        setBudgets(prev => ({ ...prev, [personId]: { ...prev[personId], [catId]: val } }));
      };

      const updateTransaction = (id, changes) => {
        setTransactions(prev => prev.map(t => t.id === id ? { ...t, ...changes } : t));
      };
      const addTransaction = (tx) => setTransactions(prev => [tx, ...prev]);

      useEffect(() => {
        if (swExpenses.length) setTransactions(prev => matchAndAdjust(prev, swExpenses));
      }, [swExpenses]);

      const handleSync = async () => {
        setSyncing(true); setSyncStatus("");
        try {
          const expenses = await fetchSplitwise(apiKey, yourId, filterMonth);
          if (!expenses.length) { setSyncStatus("⚠ No expenses returned. Check your API key and user ID."); }
          else {
            const monthLabel = MONTH_OPTIONS.find(m => m.value === filterMonth)?.label || filterMonth;
            const realTx = expenses.map((e, i) => ({
              id: Date.now() + i,
              desc: e.description,
              amount: e.totalCost,
              adjustedAmount: e.yourShare !== e.totalCost ? e.yourShare : null,
              category: guessCategory(e.description),
              date: e.date,
              person: e.paidByYou ? myName : "Joint",
              splitwiseId: `sw-${e.id}`,
              manualEdit: false,
            }));
            // Merge: keep transactions from other months, replace only this month's
            setTransactions(prev => {
              const otherMonths = prev.filter(t => !(t.date || "").startsWith(filterMonth) && !t.manualEntry);
              const manualThisMonth = prev.filter(t => (t.date || "").startsWith(filterMonth) && t.manualEntry);
              return [...otherMonths, ...manualThisMonth, ...realTx];
            });
            setSwExpenses(expenses);
            setSyncStatus(`✓ Synced ${expenses.length} expenses for ${monthLabel}`);
          }
        } catch(e) { setSyncStatus(`✗ Sync failed: ${e.message}`); }
        setSyncing(false);
      };

      const eff = tx => tx.adjustedAmount != null ? tx.adjustedAmount : tx.amount;

      // Apply all filters: person + month + category
      const filteredTx = transactions.filter(t => {
        const personMatch = filterPerson === "All" ? true
          : filterPerson === "Me" ? (t.person === myName || t.person === "Me" || t.person === "You")
          : t.person === filterPerson;
        const monthMatch = filterMonth === "all" ? true
          : (t.date || "").startsWith(filterMonth);
        const catMatch = filterCategory === "all" ? true
          : t.category === filterCategory;
        return personMatch && monthMatch && catMatch;
      });

      const totalSpent  = filteredTx.reduce((s, t) => s + eff(t), 0);
      const totalRaw    = filteredTx.reduce((s, t) => s + t.amount, 0);
      const totalSaved  = totalRaw - totalSpent;

      // For header budget bar: show my personal budget when filtered to Me, combined otherwise
      const activeBudget = filterPerson === "Me" ? totalMyBudget : totalCombinedBudget;
      const remaining    = activeBudget - totalSpent;

      const categorySpend    = Object.fromEntries(CATEGORIES.map(c => [c.id, filteredTx.filter(t => t.category === c.id).reduce((s, t) => s + eff(t), 0)]));
      const splitwiseCount   = filteredTx.filter(t => t.splitwiseId).length;

      // Per-person spend per category (for stacked bars)
      const mySpendByCat    = (catId) => transactions.filter(t => (t.person === myName || t.person === "Me" || t.person === "You") && t.category === catId).reduce((s, t) => s + eff(t), 0);
      const otherSpendByCat = (catId) => transactions.filter(t => t.person === otherName && t.category === catId).reduce((s, t) => s + eff(t), 0);

      const handleFile = useCallback(async (file) => {
        setUploadMsg("Reading statement...");
        let parsed = null;
        if (file.name.endsWith(".csv")) { const text = await file.text(); parsed = parseCSV(text); }
        if (parsed && parsed.length) {
          const adj = swExpenses.length ? matchAndAdjust(parsed, swExpenses) : parsed;
          setTransactions(p => [...p, ...adj]);
          setUploadMsg(`✓ Imported ${parsed.length} transactions`);
        } else { setUploadMsg("⚠ Could not extract transactions. Try CSV format."); }
        setTimeout(() => setUploadMsg(""), 4000);
      }, [swExpenses]);

      const onDrop = useCallback(e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) handleFile(f); }, [handleFile]);

      const month = now.toLocaleString("en-US", { month:"long", year:"numeric" });
      const TABS  = ["overview","transactions","advisor"];

      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(145deg,#F5F0E8 0%,#EDE5D8 50%,#E8DDD0 100%)", fontFamily:"'DM Mono','Courier New',monospace", paddingBottom:60 }}>

          {/* HEADER */}
          <div style={{ background:"linear-gradient(135deg,#2D5A3D 0%,#1A3A27 100%)", padding:"32px 24px 28px", color:"#F5F0E8", position:"sticky", top:0, zIndex:100 }}>
            <div style={{ maxWidth:480, margin:"0 auto" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div style={{ fontSize:11, letterSpacing:"0.2em", opacity:0.6 }}>PRIVATE FINANCE</div>
                <button onClick={onSwitchUser} style={{ fontSize:9, color:"rgba(245,240,232,0.45)", background:"none", border:"none", cursor:"pointer", letterSpacing:"0.08em", fontFamily:"'DM Mono',monospace" }}>SWITCH USER</button>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginTop:4 }}>
                <div>
                  <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:26, fontWeight:300 }}>{myName} & {otherName}</div>
                  <div style={{ fontSize:11, opacity:0.55, marginTop:2 }}>
                    {filterMonth === "all" ? "All time" : MONTH_OPTIONS.find(m => m.value === filterMonth)?.label || month}
                    {filterCategory !== "all" && ` · ${CATEGORIES.find(c=>c.id===filterCategory)?.label}`}
                  </div>
                </div>
                {splitwiseCount > 0 && (
                  <div style={{ background:"rgba(168,213,181,0.2)", border:"1px solid rgba(168,213,181,0.4)", borderRadius:10, padding:"6px 12px", textAlign:"right" }}>
                    <div style={{ fontSize:9, opacity:0.7, letterSpacing:"0.1em" }}>SPLITWISE</div>
                    <div style={{ fontSize:14, fontFamily:"'Crimson Pro',serif" }}>{splitwiseCount} adjusted</div>
                  </div>
                )}
              </div>
              <div style={{ marginTop:20, display:"flex", alignItems:"flex-end", gap:16, flexWrap:"wrap" }}>
                <div>
                  <div style={{ fontSize:11, opacity:0.55, letterSpacing:"0.12em", marginBottom:4 }}>
                    {filterPerson === "Me" ? "YOUR SPEND" : filterPerson === "All" ? "COMBINED SPEND" : `${filterPerson.toUpperCase()} SPEND`}
                  </div>
                  <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:42, fontWeight:300, lineHeight:1 }}>
                    ${totalSpent.toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 })}
                  </div>
                </div>
                {totalSaved > 0.01 && (
                  <div style={{ paddingBottom:6, fontSize:11 }}>
                    <span style={{ opacity:0.4, textDecoration:"line-through" }}>${totalRaw.toFixed(0)}</span>
                    <span style={{ marginLeft:8, color:"#A8D5B5" }}>-${totalSaved.toFixed(0)} via Splitwise</span>
                  </div>
                )}
              </div>
              <div style={{ marginTop:14, background:"rgba(255,255,255,0.15)", borderRadius:99, height:4 }}>
                <div style={{ height:"100%", borderRadius:99, width:`${Math.min((totalSpent/activeBudget)*100,100)}%`, background: totalSpent > activeBudget ? "#E74C3C" : "#A8D5B5", transition:"width 1s ease" }} />
              </div>
              <div style={{ marginTop:8, fontSize:11, opacity:0.65 }}>
                {remaining >= 0
                  ? `$${remaining.toFixed(2)} remaining of $${activeBudget.toLocaleString()} ${filterPerson === "Me" ? "personal" : "combined"} budget`
                  : `$${Math.abs(remaining).toFixed(2)} over budget`}
              </div>
            </div>
          </div>

          {/* GLOBAL FILTERS */}
          <div style={{ maxWidth:480, margin:"0 auto", padding:"14px 24px 0" }}>
            {/* Row 1: Person pills */}
            <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:10 }}>
              <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.08em", marginRight:4, flexShrink:0 }}>WHO</div>
              {["Me", otherName, "Joint"].map(p => {
                const active   = filterPerson === p;
                const dotColor = p === "Me" ? ME_COLOR : p === otherName ? OTHER_COLOR : null;
                return (
                  <button key={p} onClick={() => setFilterPerson(prev => prev === p ? "All" : p)}
                    style={{ display:"flex", alignItems:"center", gap:5, padding:"6px 14px", borderRadius:99, border:"1.5px solid", borderColor: active ? (dotColor || "#2D5A3D") : "#C8BFB0", background: active ? (dotColor || "#2D5A3D") : "transparent", color: active ? "#F5F0E8" : "#6B5E4A", fontSize:11, cursor:"pointer", letterSpacing:"0.06em", fontFamily:"'DM Mono',monospace", transition:"all 0.18s" }}>

                <option value="all">All Categories</option>
                {CATEGORIES.map(c => (

                {/* Column headers when no filter */}
                {(filterPerson === "All" || filterPerson === "Joint") && (
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 60px 60px", gap:8, marginBottom:6, padding:"0 4px" }}>
                    <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.06em" }}>CATEGORY</div>
                    <div style={{ fontSize:9, color:ME_COLOR, letterSpacing:"0.06em", textAlign:"right" }}>ME</div>
                    <div style={{ fontSize:9, color:OTHER_COLOR, letterSpacing:"0.06em", textAlign:"right" }}>{otherName.toUpperCase()}</div>
                  </div>
                )}

                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {CATEGORIES.filter(c => filterCategory === "all" || c.id === filterCategory).map((c, i) => {
                    const spent   = categorySpend[c.id] || 0;
                    const myB     = myBudget(c.id);
                    const otherB  = budgets[userId === "aldrin" ? "emily" : "aldrin"][c.id] || 0;
                    const combined = myB + otherB;
                    const budget  = filterPerson === "Me" ? myB : filterPerson === otherName ? otherB : combined;
                    const over    = spent > budget;
                    const meSp    = mySpendByCat(c.id);
                    const otherSp = otherSpendByCat(c.id);
                    const otherId = userId === "aldrin" ? "emily" : "aldrin";

                    return (
                      <div key={c.id} className="card" style={{ background:"rgba(255,255,255,0.55)", borderRadius:16, padding:"14px 16px", animationDelay:`${i*0.05}s`, border: over ? "1.5px solid #E8C5C0" : "1.5px solid rgba(255,255,255,0.6)" }}>
                        {/* Top row: icon + label + budget numbers */}
                        <div style={{ display:"grid", gridTemplateColumns:`1fr ${(filterPerson==="All"||filterPerson==="Joint") ? "60px 60px" : "auto"}`, gap:8, alignItems:"center", marginBottom:8 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                            <span style={{ fontSize:20 }}>{c.icon}</span>
                            <div>
                              <div style={{ fontSize:11, color:"#2A2219" }}>{c.label}</div>
                              <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:18, color: over ? "#C0392B" : "#2A2219" }}>
                                ${spent.toFixed(0)}
                                <span style={{ fontSize:10, color:"#9E907A", fontFamily:"'DM Mono',monospace" }}> / ${budget.toLocaleString()}</span>
                              </div>
                            </div>
                          </div>

                          {/* Per-person budget editors — only shown in combined/joint view */}
                          {(filterPerson === "All" || filterPerson === "Joint") && (
                            <>
                              <div style={{ textAlign:"right" }}>
                                {editBudget && editBudget.person === userId && editBudget.catId === c.id ? (
                                  <input type="number" defaultValue={myB} autoFocus
                                    onBlur={e => { updateBudget(userId, c.id, parseFloat(e.target.value) || myB); setEditBudget(null); }}
                                    onKeyDown={e => { if (e.key==="Enter") e.target.blur(); }}
                                    style={{ width:54, textAlign:"right", border:"none", borderBottom:`1.5px solid ${ME_COLOR}`, background:"transparent", fontSize:11, fontFamily:"'DM Mono',monospace", color:ME_COLOR, outline:"none" }} />
                                ) : (
                                  <div onClick={() => setEditBudget({ person:userId, catId:c.id })} style={{ fontSize:11, color:ME_COLOR, cursor:"pointer", borderBottom:"1px dashed #C8BFB0" }}>
                                    ${myB.toLocaleString()}
                                  </div>
                                )}
                                <div style={{ fontSize:8, color:"#9E907A", marginTop:1 }}>${meSp.toFixed(0)} spent</div>
                              </div>
                              <div style={{ textAlign:"right" }}>
                                {editBudget && editBudget.person === otherId && editBudget.catId === c.id ? (
                                  <input type="number" defaultValue={otherB} autoFocus
                                    onBlur={e => { updateBudget(otherId, c.id, parseFloat(e.target.value) || otherB); setEditBudget(null); }}
                                    onKeyDown={e => { if (e.key==="Enter") e.target.blur(); }}
                                    style={{ width:54, textAlign:"right", border:"none", borderBottom:`1.5px solid ${OTHER_COLOR}`, background:"transparent", fontSize:11, fontFamily:"'DM Mono',monospace", color:OTHER_COLOR, outline:"none" }} />
                                ) : (
                                  <div onClick={() => setEditBudget({ person:otherId, catId:c.id })} style={{ fontSize:11, color:OTHER_COLOR, cursor:"pointer", borderBottom:"1px dashed #C8BFB0" }}>
                                    ${otherB.toLocaleString()}
                                  </div>
                                )}
                                <div style={{ fontSize:8, color:"#9E907A", marginTop:1 }}>${otherSp.toFixed(0)} spent</div>
                              </div>
                            </>
                          )}

                          {/* Single-person view: show just my budget editable */}
                          {filterPerson === "Me" && (
                            <div style={{ textAlign:"right" }}>
                              {editBudget && editBudget.person === userId && editBudget.catId === c.id ? (
                                <input type="number" defaultValue={myB} autoFocus
                                  onBlur={e => { updateBudget(userId, c.id, parseFloat(e.target.value) || myB); setEditBudget(null); }}
                                  onKeyDown={e => { if (e.key==="Enter") e.target.blur(); }}
                                  style={{ width:60, textAlign:"right", border:"none", borderBottom:`1.5px solid ${ME_COLOR}`, background:"transparent", fontSize:11, fontFamily:"'DM Mono',monospace", color:ME_COLOR, outline:"none" }} />
                              ) : (
                                <div onClick={() => setEditBudget({ person:userId, catId:c.id })} style={{ fontSize:10, color:ME_COLOR, cursor:"pointer", borderBottom:"1px dashed #C8BFB0" }}>✏️ ${myB.toLocaleString()}</div>
                              )}
                            </div>
                          )}
                          {filterPerson === otherName && (
                            <div style={{ textAlign:"right" }}>
                              {editBudget && editBudget.person === otherId && editBudget.catId === c.id ? (
                                <input type="number" defaultValue={otherB} autoFocus
                                  onBlur={e => { updateBudget(otherId, c.id, parseFloat(e.target.value) || otherB); setEditBudget(null); }}
                                  onKeyDown={e => { if (e.key==="Enter") e.target.blur(); }}
                                  style={{ width:60, textAlign:"right", border:"none", borderBottom:`1.5px solid ${OTHER_COLOR}`, background:"transparent", fontSize:11, fontFamily:"'DM Mono',monospace", color:OTHER_COLOR, outline:"none" }} />
                              ) : (
                                <div onClick={() => setEditBudget({ person:otherId, catId:c.id })} style={{ fontSize:10, color:OTHER_COLOR, cursor:"pointer", borderBottom:"1px dashed #C8BFB0" }}>✏️ ${otherB.toLocaleString()}</div>
                              )}
                            </div>
                          )}
                        </div>

                        <SpendBar spent={spent} budget={budget} color={c.color} filterPerson={filterPerson} meSpent={meSp} emilySpent={otherSp} meColor={ME_COLOR} otherColor={OTHER_COLOR} />

                        {(filterPerson === "All" || filterPerson === "Joint") && (meSp > 0 || otherSp > 0) && (
                          <div style={{ display:"flex", justifyContent:"space-between", marginTop:5 }}>
                            <span style={{ fontSize:8, color:ME_COLOR }}>Me ${meSp.toFixed(0)}</span>
                            <span style={{ fontSize:8, color:OTHER_COLOR }}>{otherName} ${otherSp.toFixed(0)}</span>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* Combined totals footer */}
                <div style={{ marginTop:14, padding:"14px 16px", background:"rgba(255,255,255,0.4)", borderRadius:14, border:"1.5px solid rgba(255,255,255,0.6)" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div style={{ fontSize:11, color:"#6B5E4A" }}>
                      {filterPerson === "Me" ? "Your budget" : filterPerson === otherName ? `${otherName}'s budget` : "Combined budget"}
                    </div>
                    <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:18, color:"#2A2219" }}>
                      ${(filterPerson === "Me" ? totalMyBudget : filterPerson === otherName ? CATEGORIES.reduce((s,c)=>s+(budgets[userId==="aldrin"?"emily":"aldrin"][c.id]||0),0) : totalCombinedBudget).toLocaleString()}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* TRANSACTIONS */}
            {activeTab === "transactions" && (
              <div className="card">
                {/* Splitwise sync panel */}
                <SplitwisePanel
                  apiKey={apiKey} setApiKey={setApiKey}
                  yourId={yourId} setYourId={setYourId}
                  emilyId={emilyId} setEmilyId={setEmilyId}
                  onSync={handleSync} syncing={syncing} syncStatus={syncStatus}
                  filteredTx={filteredTx} totalRaw={totalRaw} totalSpent={totalSpent} totalSaved={totalSaved}
                />

                {/* Transaction list */}
                <div style={{ marginTop:16 }}>
                  <div style={{ marginBottom:12, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div style={{ fontSize:11, color:"#8A7A68", letterSpacing:"0.08em" }}>{filteredTx.length} TRANSACTIONS</div>
                    <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                      <div style={{ fontSize:11, color:"#2D5A3D" }}>${totalSpent.toFixed(2)} actual</div>
                      <button onClick={() => setAddingTx(true)} style={{ display:"flex", alignItems:"center", gap:5, padding:"5px 12px", borderRadius:99, border:"1.5px solid #2D5A3D", background:"#2D5A3D", color:"#F5F0E8", fontSize:10, cursor:"pointer", fontFamily:"'DM Mono',monospace", letterSpacing:"0.06em" }}>
                        + Add
                      </button>
                    </div>
                  </div>
                  <div style={{ fontSize:10, color:"#9E907A", marginBottom:10, textAlign:"center" }}>Tap any transaction to edit</div>
                  <div style={{ background:"rgba(255,255,255,0.55)", borderRadius:16, overflow:"hidden", border:"1.5px solid rgba(255,255,255,0.6)" }}>
                    {[...filteredTx].sort((a,b) => new Date(b.date)-new Date(a.date)).map((tx, i) => {
                      const cat       = CATEGORIES.find(c => c.id === tx.category);
                      const effective = eff(tx);
                      return (
                        <div key={tx.id} className="tx-row" onClick={() => setEditingTx(tx)}
                          style={{ padding:"12px 18px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:12, borderBottom: i < filteredTx.length-1 ? "1px solid rgba(200,191,176,0.4)" : "none", transition:"background 0.15s", cursor:"pointer" }}>
                          <div style={{ display:"flex", gap:10, alignItems:"flex-start", flex:1, minWidth:0 }}>
                            <span style={{ fontSize:15, flexShrink:0, marginTop:2 }}>{cat ? cat.icon : "💳"}</span>
                            <div style={{ minWidth:0 }}>
                              <div style={{ fontSize:12, color:"#2A2219", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                                {tx.desc}
                                {tx.manualEntry && <span style={{ marginLeft:6, fontSize:8, color:"#4A7C8E", background:"#E8F4F8", borderRadius:99, padding:"1px 5px" }}>manual</span>}
                                {tx.manualEdit && !tx.manualEntry && <span style={{ marginLeft:6, fontSize:8, color:"#8A6A2A", background:"#FDF0E0", borderRadius:99, padding:"1px 5px" }}>edited</span>}
                              </div>
                              <div style={{ fontSize:9, color:"#9E907A", marginTop:2 }}>{tx.date} · {tx.person}</div>
                              {tx.splitwiseId && !tx.manualEntry && <Badge tx={tx} />}
                            </div>
                          </div>
                          <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
                            <div style={{ textAlign:"right" }}>
                              <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:17, color:"#2A2219" }}>${effective.toFixed(2)}</div>
                              {tx.adjustedAmount != null && tx.adjustedAmount !== tx.amount && !tx.manualEdit && (
                                <div style={{ fontSize:9, color:"#9E907A", textDecoration:"line-through" }}>${tx.amount.toFixed(2)}</div>
                              )}
                            </div>
                            <span style={{ fontSize:11, color:"#C8BFB0" }}>✏️</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {editingTx && <EditModal tx={editingTx} onSave={updateTransaction} onClose={() => setEditingTx(null)} />}
                {addingTx  && <AddTransactionModal onAdd={addTransaction} onClose={() => setAddingTx(false)} />}
              </div>
            )}

            {/* ADVISOR */}
            {activeTab === "advisor" && (
              <div className="card">
                <div style={{ background:"rgba(255,255,255,0.55)", borderRadius:16, padding:"24px 20px", marginBottom:16, border:"1.5px solid rgba(255,255,255,0.6)", textAlign:"center" }}>
                  <div style={{ fontSize:32, marginBottom:10 }}>🌿</div>
                  <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:20, color:"#2A2219", marginBottom:8, fontStyle:"italic" }}>Your Personal Advisor</div>
                  <div style={{ fontSize:12, color:"#8A7A68", lineHeight:1.7 }}>Powered by Splitwise-adjusted figures — your real spend, not raw card totals.</div>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:16 }}>
                  {[
                    { label:"Transactions", val:filteredTx.length },
                    { label:"Adjusted",     val:splitwiseCount },
                    { label:"Over Budget",  val:CATEGORIES.filter(c => (categorySpend[c.id]||0) > myBudget(c.id)).length },
                  ].map(s => (
                    <div key={s.label} style={{ background:"rgba(255,255,255,0.55)", borderRadius:12, padding:"12px", textAlign:"center", border:"1.5px solid rgba(255,255,255,0.6)" }}>
                      <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:24, color:"#2A2219" }}>{s.val}</div>
                      <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.06em" }}>{s.label.toUpperCase()}</div>
                    </div>
                  ))}
                </div>
                <AIAdvisor transactions={filteredTx} budgets={Object.fromEntries(CATEGORIES.map(c=>[c.id, combinedBudget(c.id)]))} categorySpend={categorySpend} />
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
