      return <AppInner userId={userId} onSwitchUser={switchUser} />;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // MAIN APP
    // ─────────────────────────────────────────────────────────────────────────

    function AppInner({ userId, onSwitchUser }) {
      const me       = PEOPLE[userId];
      const other    = PEOPLE[userId === "aldrin" ? "emily" : "aldrin"];
      const otherId  = userId === "aldrin" ? "emily" : "aldrin"; // Fix #5: single definition
      const ME_COLOR    = me.color;
      const OTHER_COLOR = other.color;
      const myName      = me.name;
      const otherName   = other.name;

      // ── PERSISTED STATE ────────────────────────────────────────────────────
      // Transactions + budgets → Firestore (shared between Aldrin & Emily)
      // API key + SW user ID  → localStorage only (never leaves device)
      // Sync timestamps       → Firestore per-user (so each can see the other's)

      const [transactions, setTransactionsRaw] = useState(SAMPLE);
      const [budgets,      setBudgetsRaw]       = useState({ aldrin: { ...DEFAULT_BUDGETS }, emily: { ...DEFAULT_BUDGETS } });
      const [apiKey,       setApiKeyRaw]        = useState(() => lsGet(`finance_apikey_${userId}`, ""));
      const [yourId,       setYourIdRaw]        = useState(() => lsGet(`finance_swid_${userId}`,   null));
      const [syncMeta,     setSyncMeta]         = useState({ aldrin: null, emily: null });
      const [income,       setIncomeRaw]         = useState(DEFAULT_INCOME);
      const [catRules,     setCatRulesRaw]       = useState({}); // { "Deliveroo": "groceries", ... }
      const [hasSeenOnboarding, setHasSeenOnboarding] = useState(() => lsGet(`finance_onboarded_${userId}`, false));
      const [fbLoaded,     setFbLoaded]         = useState(false);

      // Credentials stay local
      const setApiKey = v => { setApiKeyRaw(v); lsSet(`finance_apikey_${userId}`, v); };
      const setYourId = v => { setYourIdRaw(v); lsSet(`finance_swid_${userId}`,   v); };

      // Firestore writers — write to cloud, also update local state
      const setTransactions = fn => {
        setTransactionsRaw(prev => {
          const next = typeof fn === "function" ? fn(prev) : fn;
          fbSet(FB_DOC.transactions(), { list: next });
          return next;
        });
      };
      const setBudgets = fn => {
        setBudgetsRaw(prev => {
          const next = typeof fn === "function" ? fn(prev) : fn;
          fbSet(FB_DOC.budgets(), next);
          return next;
        });
      };

      const setIncome = fn => {
        setIncomeRaw(prev => {
          const next = typeof fn === "function" ? fn(prev) : fn;
          fbSet(FB_DOC.income(), next);
          return next;
        });
      };
      const setCatRules = fn => {
        setCatRulesRaw(prev => {
          const next = typeof fn === "function" ? fn(prev) : fn;
          fbSet(FB_DOC.rules(), next);
          return next;
        });
      };

      // Subscribe to Firestore on mount — live updates for both users
      useEffect(() => {
        if (!window.__fbReady) return;
        const unsubTx = fbListen(FB_DOC.transactions(), data => {
          if (data.list?.length) { setTransactionsRaw(data.list); setFbLoaded(true); }
        });
        const unsubBudgets = fbListen(FB_DOC.budgets(), data => {
          if (data.aldrin || data.emily) setBudgetsRaw(prev => ({ ...prev, ...data }));
        });
        const unsubMeta = fbListen(FB_DOC.syncMeta("aldrin"), data => {
          setSyncMeta(prev => ({ ...prev, aldrin: data.lastSynced || null }));
        });
        const unsubMetaEm = fbListen(FB_DOC.syncMeta("emily"), data => {
          setSyncMeta(prev => ({ ...prev, emily: data.lastSynced || null }));
        });
        const unsubIncome = fbListen(FB_DOC.income(), data => {
          if (data) setIncomeRaw(prev => ({ ...prev, ...data }));
        });
        const unsubRules = fbListen(FB_DOC.rules(), data => {
          if (data) setCatRulesRaw(data);
        });
        // Load initial data if no snapshot yet
        fbGet(FB_DOC.transactions(), null).then(data => {
          if (data?.list?.length) { setTransactionsRaw(data.list); setFbLoaded(true); }
          else setFbLoaded(true); // no cloud data yet — show sample
        });
        return () => { unsubTx(); unsubBudgets(); unsubMeta(); unsubMetaEm(); unsubIncome(); unsubRules(); };
      }, []);

      // Convenience: my last sync + other person's last sync
      const myLastSynced    = syncMeta[userId];
      const otherLastSynced = syncMeta[otherId];

      // ── DERIVED: income, recurring, cash flow ─────────────────────────────
      const myIncome    = income[userId]    || 0;
      const otherIncome = income[otherId]   || 0;
      const totalIncome = myIncome + otherIncome;
      const cashFlow    = useMemo(() => buildCashFlow(transactions, income), [transactions, income]);
      const recurring   = useMemo(() => detectRecurring(transactions), [transactions]);
      const committedThisMonth = useMemo(() =>
        recurring.filter(r => {
          // Only count if it hasn't appeared in current month yet
          return !transactions.some(t => t.desc === r.desc && (t.date||"").startsWith(CURRENT_MONTH));
        }),
      [recurring, transactions]);

      // ── UI STATE ──────────────────────────────────────────────────────────
      const [activeTab,       setActiveTab]       = useState("overview");
      const [filterPerson,    setFilterPerson]    = useState("All");
      const [filterMonth,     setFilterMonth]     = useState(CURRENT_MONTH);
      const [filterCategory,  setFilterCategory]  = useState("all");
      const [searchQuery,     setSearchQuery]     = useState(""); // Fix #13
      const [syncing,         setSyncing]         = useState(false);
      const [syncStatus,      setSyncStatus]      = useState("");
      const [swExpenses,      setSwExpenses]      = useState([]);
      const [editingTx,       setEditingTx]       = useState(null);
      const [addingTx,        setAddingTx]        = useState(false);
      const [uploadMsg,       setUploadMsg]       = useState("");
      const [editBudget,      setEditBudget]       = useState(null);
      const [expandedCards,   setExpandedCards]   = useState({}); // Fix #17: collapse overview cards
      const [toast,           setToast]           = useState("");
      const fileRef = useRef();

      const showToast = msg => { setToast(msg); setTimeout(() => setToast(""), 2800); };

      // ── BUDGET HELPERS ────────────────────────────────────────────────────
      const combinedBudget      = catId => (budgets.aldrin[catId] || 0) + (budgets.emily[catId] || 0);
      const totalCombinedBudget = useMemo(() => CATEGORIES.reduce((s, c) => s + combinedBudget(c.id), 0), [budgets]);
      const myBudget            = catId => budgets[userId][catId] || 0;
      const totalMyBudget       = useMemo(() => CATEGORIES.reduce((s, c) => s + myBudget(c.id), 0), [budgets, userId]);
      const otherBudget         = catId => budgets[otherId][catId] || 0;
      const totalOtherBudget    = useMemo(() => CATEGORIES.reduce((s, c) => s + otherBudget(c.id), 0), [budgets, otherId]);

      const updateBudget = (personId, catId, val) =>
        setBudgets(prev => ({ ...prev, [personId]: { ...prev[personId], [catId]: val } }));

      const updateTransaction = (id, changes) =>
        setTransactions(prev => prev.map(t => t.id === id ? { ...t, ...changes } : t));

      const deleteTransaction = id => { // Fix #14
        setTransactions(prev => prev.filter(t => t.id !== id));
        showToast("Transaction deleted");
      };

      const addTransaction = tx => setTransactions(prev => [tx, ...prev]);

      // ── SYNC ──────────────────────────────────────────────────────────────
      const handleSync = useCallback(async () => { // Fix #2: useCallback
        if (!apiKey || !yourId) return;
        setSyncing(true); setSyncStatus("");
        try {
          const expenses = await fetchSplitwise(apiKey, yourId);
          if (!expenses.length) {
            // Warm message (Fix #16)
            setSyncStatus("No expenses found for this period — double-check your credentials.");
          } else {
            const realTx = expenses.map(e => ({
              id:             `sw-${e.id}`, // string (Fix #3)
              desc:           e.description,
              amount:         e.totalCost,
              adjustedAmount: e.yourShare !== e.totalCost ? e.yourShare : null,
              category:       catRules[e.description] || guessCategory(e.description),
              date:           e.date,
              // Person tagging: Emily on expense → Joint, else personal
              person:         e.emilyOnExpense ? "Joint" : myName,
              splitwiseId:    `sw-${e.id}`,
              manualEdit:     false,
              manualEntry:    false,
            }));
            setTransactions(prev => {
              const manual = prev.filter(t => t.manualEntry);
              return [...manual, ...realTx];
            });
            setSwExpenses(expenses);
            const ts = new Date().toLocaleString("en-US", { month:"short", day:"numeric", hour:"numeric", minute:"2-digit" });
            // Write this user's sync time to Firestore so the other person can see it
            fbSet(FB_DOC.syncMeta(userId), { lastSynced: ts });
            setSyncMeta(prev => ({ ...prev, [userId]: ts }));
            setSyncStatus(`✓ Synced ${expenses.length} expenses — all up to date`);
            showToast(`✓ ${expenses.length} expenses synced`);
          }
        } catch(err) {
          // Descriptive errors from fetchSplitwise + warm framing (Fix #6 + #16)
          setSyncStatus(`Couldn't connect — ${err.message}`);
          showToast("Sync failed — tap Transactions to retry");
        }
        setSyncing(false);
      }, [apiKey, yourId, userId, myName, otherId]);

      // Auto-sync on open if credentials exist (Fix #2: depends on stable handleSync)
      useEffect(() => { handleSync(); }, [handleSync]);

      useEffect(() => {
        if (swExpenses.length) setTransactions(prev => matchAndAdjust(prev, swExpenses));
      }, [swExpenses]);

      // ── PACE CALCULATOR ───────────────────────────────────────────────────
      const todayDay    = now.getDate();
      const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
      const monthPct    = todayDay / daysInMonth;

      const getPaceStatus = (spent, budget) => {
        if (!budget)         return "none";
        if (spent >= budget) return "over";
        const ratio = spent / (budget * monthPct);
        if (ratio > 1.15)   return "at-risk";
        if (ratio < 0.85)   return "under";
        return "on-track";
      };

      // ── MEMOISED CALCULATIONS (Fix #7) ────────────────────────────────────
      const filteredTx = useMemo(() => {
        return transactions.filter(t => {
          const personMatch =
            filterPerson === "All"     ? true :
            filterPerson === "Me"      ? (t.person === myName || t.person === "Me" || t.person === "You") :
            filterPerson === otherName ? (t.person === otherName) :
            filterPerson === "Joint"   ? (t.person === "Joint") : true;
          const monthMatch    = filterMonth === "all"    ? true : (t.date || "").startsWith(filterMonth);
          const catMatch      = filterCategory === "all" ? true : t.category === filterCategory;
          const searchMatch   = !searchQuery.trim()      ? true : t.desc.toLowerCase().includes(searchQuery.toLowerCase());
          return personMatch && monthMatch && catMatch && searchMatch;
        });
      }, [transactions, filterPerson, filterMonth, filterCategory, searchQuery, myName, otherName]);

      const categorySpend = useMemo(() =>
        Object.fromEntries(CATEGORIES.map(c => [
          c.id,
          filteredTx.filter(t => t.category === c.id).reduce((s, t) => s + getEffectiveAmount(t), 0)
        ])),
      [filteredTx]);

      // Per-person spend respects month filter
      const mySpendByCat = useMemo(() =>
        Object.fromEntries(CATEGORIES.map(c => [
          c.id,
          transactions
            .filter(t => (t.person === myName || t.person === "Me" || t.person === "You") && t.category === c.id && (filterMonth === "all" || (t.date || "").startsWith(filterMonth)))
            .reduce((s, t) => s + getEffectiveAmount(t), 0)
        ])),
      [transactions, myName, filterMonth]);

      const otherSpendByCat = useMemo(() =>
        Object.fromEntries(CATEGORIES.map(c => [
          c.id,
          transactions
            .filter(t => t.person === otherName && t.category === c.id && (filterMonth === "all" || (t.date || "").startsWith(filterMonth)))
            .reduce((s, t) => s + getEffectiveAmount(t), 0)
        ])),
      [transactions, otherName, filterMonth]);

      const sortedTx = useMemo(() =>
        [...filteredTx].sort((a, b) => new Date(b.date) - new Date(a.date)),
      [filteredTx]);

      const totalSpent   = filteredTx.reduce((s, t) => s + getEffectiveAmount(t), 0);
      const totalRaw     = filteredTx.reduce((s, t) => s + t.amount, 0);
      const totalSaved   = totalRaw - totalSpent;
      const splitwiseCount = filteredTx.filter(t => t.splitwiseId).length;

      const activeBudget = filterPerson === "Me" ? totalMyBudget : filterPerson === otherName ? totalOtherBudget : totalCombinedBudget;
      const remaining    = activeBudget - totalSpent;

      // ── PROACTIVE ALERTS (Fix #1: now after categorySpend) ────────────────
      const alerts = useMemo(() => {
        const a = [];
        if (filterMonth !== CURRENT_MONTH) return a;
        CATEGORIES.forEach(c => {
          const spent  = categorySpend[c.id] || 0;
          const budget = filterPerson === "Me" ? myBudget(c.id) : combinedBudget(c.id);
          const status = getPaceStatus(spent, budget);
          if (status === "over")     a.push({ type:"over",     msg:`${c.icon} ${c.label} is $${(spent-budget).toFixed(0)} over budget` });
          if (status === "at-risk")  a.push({ type:"at-risk",  msg:`${c.icon} ${c.label} is trending over — consider slowing down` });
        });
        const overall = getPaceStatus(totalSpent, activeBudget);
        if (overall === "on-track") a.push({ type:"on-track", msg:`✦ Overall spending is on track for ${MONTH_OPTIONS[0].label}` });
        if (overall === "under")    a.push({ type:"under",    msg:`✦ Great job — you're well under budget with ${Math.round((1-monthPct)*100)}% of the month left` });
        return a.slice(0, 2);
      }, [categorySpend, filterPerson, filterMonth, totalSpent, activeBudget]);

      // ── FILE HANDLING ─────────────────────────────────────────────────────
      const handleFile = useCallback(async file => {
        setUploadMsg("Reading statement...");
        let parsed = null;
        if (file.name.endsWith(".csv")) { const text = await file.text(); parsed = parseCSV(text); }
        if (parsed?.length) {
          const adjusted = swExpenses.length ? matchAndAdjust(parsed, swExpenses) : parsed;
          setTransactions(p => [...p, ...adjusted]);
          setUploadMsg(`✓ Imported ${parsed.length} transactions`);
          showToast(`✓ Imported ${parsed.length} transactions`);
        } else {
          setUploadMsg("Couldn't read this file — try exporting as CSV from your bank");
        }
        setTimeout(() => setUploadMsg(""), 4000);
      }, [swExpenses]);

      const onDrop = useCallback(e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) handleFile(f); }, [handleFile]);

      const activeMonthLabel = MONTH_OPTIONS.find(m => m.value === filterMonth)?.label || "";

      // ── RENDER ────────────────────────────────────────────────────────────
      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(145deg,#F5F0E8 0%,#EDE5D8 50%,#E8DDD0 100%)", fontFamily:"'DM Mono','Courier New',monospace", paddingBottom:80 }}>

          {/* HEADER */}
          <div style={{ background:"linear-gradient(135deg,#2D5A3D 0%,#1A3A27 100%)", padding:"20px 20px 18px", color:"#F5F0E8", position:"sticky", top:0, zIndex:100 }}>
            <div style={{ maxWidth:480, margin:"0 auto" }}>

              {/* Top row: label + quick user toggle */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                <div style={{ fontSize:10, letterSpacing:"0.2em", opacity:0.45 }}>PRIVATE FINANCE</div>
                <div style={{ display:"flex", gap:6 }}>
                  {Object.entries(PEOPLE).map(([id, p]) => (
                    <button key={id} onClick={() => id !== userId && onSwitchUser(id)}
                      style={{ padding:"3px 10px", borderRadius:99, border:`1.5px solid ${id===userId ? p.color : "rgba(255,255,255,0.2)"}`, background: id===userId ? p.color : "transparent", color: id===userId ? "#fff" : "rgba(255,255,255,0.4)", fontSize:9, cursor: id===userId ? "default" : "pointer", fontFamily:"'DM Mono',monospace", letterSpacing:"0.06em", transition:"all 0.15s" }}>
                      {p.name}
                    </button>
                  ))}
                </div>
              </div>

              {/* Name + month label */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div>
                  <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:22, fontWeight:300 }}>{myName} & {otherName}</div>
                  <div style={{ fontSize:10, opacity:0.5, marginTop:1 }}>
                    {activeMonthLabel}
                    {filterCategory !== "all" && ` · ${CATEGORIES.find(c=>c.id===filterCategory)?.label}`}
                    {syncing && <span style={{ marginLeft:8, opacity:0.7 }}>⟳ syncing…</span>}
                  </div>
                </div>
                {splitwiseCount > 0 && (
                  <div style={{ background:"rgba(168,213,181,0.2)", border:"1px solid rgba(168,213,181,0.4)", borderRadius:10, padding:"5px 10px", textAlign:"right" }}>
                    <div style={{ fontSize:8, opacity:0.6, letterSpacing:"0.1em" }}>SPLITWISE</div>
                    <div style={{ fontSize:13, fontFamily:"'Crimson Pro',serif" }}>{splitwiseCount} adjusted</div>
                  </div>
                )}
              </div>

              {/* Spend + savings offset */}
              <div style={{ marginTop:14, display:"flex", alignItems:"flex-end", gap:14, flexWrap:"wrap" }}>
                <div>
                  <div style={{ fontSize:10, opacity:0.5, letterSpacing:"0.12em", marginBottom:2 }}>
                    {filterPerson === "Me" ? "YOUR SPEND" : filterPerson === "All" ? "COMBINED SPEND" : `${filterPerson.toUpperCase()} SPEND`}
                  </div>
                  <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:38, fontWeight:300, lineHeight:1 }}>
                    ${totalSpent.toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 })}
                  </div>
                </div>
                {totalSaved > 0.01 && (
                  <div style={{ paddingBottom:4, fontSize:11 }}>
                    <span style={{ opacity:0.35, textDecoration:"line-through" }}>${totalRaw.toFixed(0)}</span>
                    <span style={{ marginLeft:8, color:"#A8D5B5", fontWeight:500 }}>-${totalSaved.toFixed(0)} via Splitwise</span>
                  </div>
                )}
              </div>

              {/* Budget progress bar — thicker (Fix UX #1) */}
              <div style={{ marginTop:10, background:"rgba(255,255,255,0.15)", borderRadius:99, height:8 }}>
                <div style={{ height:"100%", borderRadius:99, width:`${Math.min((totalSpent/activeBudget)*100,100)}%`, background: totalSpent > activeBudget ? "#E74C3C" : "#A8D5B5", transition:"width 1s ease" }} />
              </div>
              <div style={{ marginTop:5, fontSize:10, opacity:0.6 }}>
                {remaining >= 0
                  ? `$${remaining.toFixed(0)} remaining of $${activeBudget.toLocaleString()} budget`
                  : `$${Math.abs(remaining).toFixed(0)} over budget — consider adjusting next month`}
              </div>

              {/* Proactive alerts (warm language — Fix #16) */}
              {alerts.length > 0 && (
                <div style={{ marginTop:10, display:"flex", flexDirection:"column", gap:5 }}>
                  {alerts.map((a, i) => (
                    <div key={i} style={{ background: PACE_BG[a.type], borderRadius:8, padding:"6px 10px", fontSize:10, color: PACE_COLOR[a.type] }}>
                      {a.msg}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* GLOBAL FILTERS */}
          <div style={{ maxWidth:480, margin:"0 auto", padding:"12px 20px 0" }}>
            {/* Person pills */}
            <div style={{ display:"flex", gap:7, alignItems:"center", marginBottom:9 }}>
              <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.08em", flexShrink:0 }}>WHO</div>
              {["Me", otherName, "Joint"].map(p => {
                const active   = filterPerson === p;
                const dotColor = p === "Me" ? ME_COLOR : p === otherName ? OTHER_COLOR : null;
                return (
                  <button key={p} onClick={() => setFilterPerson(prev => prev === p ? "All" : p)}
                    style={{ display:"flex", alignItems:"center", gap:5, padding:"5px 13px", borderRadius:99, border:"1.5px solid", borderColor: active ? (dotColor || "#2D5A3D") : "#C8BFB0", background: active ? (dotColor || "#2D5A3D") : "transparent", color: active ? "#F5F0E8" : "#6B5E4A", fontSize:11, cursor:"pointer", letterSpacing:"0.05em", fontFamily:"'DM Mono',monospace", transition:"all 0.15s" }}>
                    {!active && dotColor && <span style={{ width:6, height:6, borderRadius:99, background:dotColor, display:"inline-block" }} />}
                    {p}
                  </button>
                );
              })}
            </div>
            {/* Month + Category dropdowns */}
            <div style={{ display:"flex", gap:8 }}>
              <select value={filterMonth} onChange={e => setFilterMonth(e.target.value)}
                style={{ flex:1, padding:"7px 10px", borderRadius:10, border:"1.5px solid #D5CAB8", background:"rgba(255,255,255,0.7)", fontFamily:"'DM Mono',monospace", color:"#2A2219", outline:"none", cursor:"pointer" }}>
                {MONTH_OPTIONS.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
              </select>
              <select value={filterCategory} onChange={e => setFilterCategory(e.target.value)}
                style={{ flex:1, padding:"7px 10px", borderRadius:10, border:"1.5px solid #D5CAB8", background:"rgba(255,255,255,0.7)", fontFamily:"'DM Mono',monospace", color:"#2A2219", outline:"none", cursor:"pointer" }}>
                <option value="all">All Categories</option>
                {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
              </select>
            </div>
          </div>

          {/* CONTENT */}
          <div style={{ maxWidth:480, margin:"0 auto", padding:"16px 20px 0" }}>

            {/* ── OVERVIEW ── */}
            {activeTab === "overview" && (
              <div>
                {/* First-run onboarding banner (Fix UX #15) */}
                {!hasSeenOnboarding && (
                  <div style={{ background:"#EAF4ED", border:"1.5px solid #A8D5B5", borderRadius:14, padding:"14px 16px", marginBottom:14, display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:10 }}>
                    <div>
                      <div style={{ fontSize:12, color:"#2D5A3D", fontWeight:500, marginBottom:4 }}>👋 You're viewing sample data</div>
                      <div style={{ fontSize:11, color:"#4A7C6E", lineHeight:1.6 }}>Go to Transactions → Splitwise to connect your account, or tap + to add transactions manually.</div>
                    </div>
                    <button onClick={() => { setHasSeenOnboarding(true); lsSet(`finance_onboarded_${userId}`, true); }} style={{ background:"none", border:"none", fontSize:16, cursor:"pointer", color:"#6B8F71", flexShrink:0 }}>✕</button>
                  </div>
                )}

                {/* CSV upload zone */}
                <div onDrop={onDrop} onDragOver={e => e.preventDefault()} onClick={() => fileRef.current.click()}
                  style={{ border:"1.5px dashed #B8AD9E", borderRadius:14, padding:"14px", textAlign:"center", cursor:"pointer", marginBottom:14, background:"rgba(255,255,255,0.3)" }}>
                  <input ref={fileRef} type="file" accept=".csv" style={{ display:"none" }} onChange={e => e.target.files[0] && handleFile(e.target.files[0])} />
                  <div style={{ fontSize:18, marginBottom:3 }}>📂</div>
                  <div style={{ fontSize:11, color:"#6B5E4A" }}>Drop CSV bank statement here</div>
                  {uploadMsg && <div style={{ marginTop:6, fontSize:11, color:"#2D5A3D" }}>{uploadMsg}</div>}
                </div>

                {/* Column headers (combined view) */}
                {(filterPerson === "All" || filterPerson === "Joint") && (
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 58px 58px", gap:8, marginBottom:5, padding:"0 4px" }}>
                    <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.06em" }}>CATEGORY</div>
                    <div style={{ fontSize:9, color:ME_COLOR, letterSpacing:"0.06em", textAlign:"right" }}>ME</div>
                    <div style={{ fontSize:9, color:OTHER_COLOR, letterSpacing:"0.06em", textAlign:"right" }}>{otherName.toUpperCase()}</div>
                  </div>
                )}

                {/* Category cards — collapsed by default, tap to expand (Fix UX #17) */}
                <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
                  {CATEGORIES.filter(c => filterCategory === "all" || c.id === filterCategory).map((c, i) => {
                    const spent    = categorySpend[c.id] || 0;
                    const myB      = myBudget(c.id);
                    const otherB   = otherBudget(c.id);
                    const combined = myB + otherB;
                    const budget   = filterPerson === "Me" ? myB : filterPerson === otherName ? otherB : combined;
                    const over     = spent > budget;
                    const meSp     = mySpendByCat[c.id] || 0;
                    const otherSp  = otherSpendByCat[c.id] || 0;
                    const paceStatus = filterMonth === CURRENT_MONTH ? getPaceStatus(spent, budget) : null;
                    const expanded   = !!expandedCards[c.id];

                    return (
                      <div key={c.id} className="card" style={{ background:"rgba(255,255,255,0.55)", borderRadius:14, padding:"12px 14px", animationDelay:`${i*0.04}s`, border: over ? "1.5px solid #E8C5C0" : "1.5px solid rgba(255,255,255,0.6)" }}>
                        {/* Collapsed row — always visible */}
                        <div onClick={() => setExpandedCards(prev => ({ ...prev, [c.id]: !expanded }))}
                          style={{ display:"grid", gridTemplateColumns:`1fr ${(filterPerson==="All"||filterPerson==="Joint") ? "58px 58px" : "auto"}`, gap:8, alignItems:"center", cursor:"pointer" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                            <span style={{ fontSize:20 }}>{c.icon}</span>
                            <div>
                              <div style={{ fontSize:11, color:"#2A2219" }}>{c.label}</div>
                              <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:1 }}>
                                <span style={{ fontFamily:"'Crimson Pro',serif", fontSize:17, color: over ? "#C0392B" : "#2A2219" }}>${spent.toFixed(0)}</span>
                                <span style={{ fontSize:10, color:"#9E907A" }}>/ ${budget.toLocaleString()}</span>
                                {paceStatus && paceStatus !== "none" && (
                                  <span style={{ fontSize:8, background: PACE_BG[paceStatus], color: PACE_COLOR[paceStatus], borderRadius:99, padding:"1px 6px" }}>
                                    {PACE_LABEL[paceStatus]}
                                  </span>
                                )}
                              </div>
                            </div>
                          </div>

                          {/* Inline budget editors (combined view) */}
                          {(filterPerson === "All" || filterPerson === "Joint") && (
                            <>
                              <div style={{ textAlign:"right" }} onClick={e => e.stopPropagation()}>
                                {editBudget?.person === userId && editBudget?.catId === c.id ? (
                                  <input type="number" defaultValue={myB} autoFocus
                                    onBlur={e => { updateBudget(userId, c.id, parseFloat(e.target.value) || myB); setEditBudget(null); }}
                                    onKeyDown={e => e.key==="Enter" && e.target.blur()}
                                    style={{ width:52, textAlign:"right", border:"none", borderBottom:`1.5px solid ${ME_COLOR}`, background:"transparent", fontFamily:"'DM Mono',monospace", color:ME_COLOR, outline:"none" }} />
                                ) : (
                                  <div onClick={() => setEditBudget({ person:userId, catId:c.id })} style={{ fontSize:11, color:ME_COLOR, cursor:"pointer", borderBottom:"1px dashed #C8BFB0" }}>${myB.toLocaleString()}</div>
                                )}
                                <div style={{ fontSize:8, color:"#9E907A", marginTop:1 }}>${meSp.toFixed(0)} spent</div>
                              </div>
                              <div style={{ textAlign:"right" }} onClick={e => e.stopPropagation()}>
                                {editBudget?.person === otherId && editBudget?.catId === c.id ? (
                                  <input type="number" defaultValue={otherB} autoFocus
                                    onBlur={e => { updateBudget(otherId, c.id, parseFloat(e.target.value) || otherB); setEditBudget(null); }}
                                    onKeyDown={e => e.key==="Enter" && e.target.blur()}
                                    style={{ width:52, textAlign:"right", border:"none", borderBottom:`1.5px solid ${OTHER_COLOR}`, background:"transparent", fontFamily:"'DM Mono',monospace", color:OTHER_COLOR, outline:"none" }} />
                                ) : (
                                  <div onClick={() => setEditBudget({ person:otherId, catId:c.id })} style={{ fontSize:11, color:OTHER_COLOR, cursor:"pointer", borderBottom:"1px dashed #C8BFB0" }}>${otherB.toLocaleString()}</div>
                                )}
                                <div style={{ fontSize:8, color:"#9E907A", marginTop:1 }}>${otherSp.toFixed(0)} spent</div>
                              </div>
                            </>
                          )}

                          {/* Single-person budget editors */}
                          {filterPerson === "Me" && (
                            <div style={{ textAlign:"right" }} onClick={e => e.stopPropagation()}>
                              {editBudget?.person === userId && editBudget?.catId === c.id ? (
                                <input type="number" defaultValue={myB} autoFocus
                                  onBlur={e => { updateBudget(userId, c.id, parseFloat(e.target.value) || myB); setEditBudget(null); }}
                                  onKeyDown={e => e.key==="Enter" && e.target.blur()}
                                  style={{ width:58, textAlign:"right", border:"none", borderBottom:`1.5px solid ${ME_COLOR}`, background:"transparent", fontFamily:"'DM Mono',monospace", color:ME_COLOR, outline:"none" }} />
                              ) : (
                                <div onClick={() => setEditBudget({ person:userId, catId:c.id })} style={{ fontSize:10, color:ME_COLOR, cursor:"pointer", borderBottom:"1px dashed #C8BFB0" }}>✏️ ${myB.toLocaleString()}</div>
                              )}
                            </div>
                          )}
                          {filterPerson === otherName && (
                            <div style={{ textAlign:"right" }} onClick={e => e.stopPropagation()}>
                              {editBudget?.person === otherId && editBudget?.catId === c.id ? (
                                <input type="number" defaultValue={otherB} autoFocus
                                  onBlur={e => { updateBudget(otherId, c.id, parseFloat(e.target.value) || otherB); setEditBudget(null); }}
                                  onKeyDown={e => e.key==="Enter" && e.target.blur()}
                                  style={{ width:58, textAlign:"right", border:"none", borderBottom:`1.5px solid ${OTHER_COLOR}`, background:"transparent", fontFamily:"'DM Mono',monospace", color:OTHER_COLOR, outline:"none" }} />
                              ) : (
                                <div onClick={() => setEditBudget({ person:otherId, catId:c.id })} style={{ fontSize:10, color:OTHER_COLOR, cursor:"pointer", borderBottom:"1px dashed #C8BFB0" }}>✏️ ${otherB.toLocaleString()}</div>
                              )}
                            </div>
                          )}
                        </div>

                        {/* Spend bar — always visible */}
                        <SpendBar
                          spent={spent} budget={budget} color={c.color}
                          filterPerson={filterPerson}
                          meSpent={meSp} otherSpent={otherSp}
                          meBarColor={ME_COLOR} otherBarColor={OTHER_COLOR}
                        />

                        {/* Expanded: per-person breakdown */}
                        {expanded && (filterPerson === "All" || filterPerson === "Joint") && (
                          <div style={{ display:"flex", justifyContent:"space-between", marginTop:8, paddingTop:8, borderTop:"1px solid rgba(200,191,176,0.3)" }}>
                            <span style={{ fontSize:9, color:ME_COLOR }}>Me ${meSp.toFixed(0)}</span>
                            <span style={{ fontSize:9, color:OTHER_COLOR }}>{otherName} ${otherSp.toFixed(0)}</span>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* Budget totals footer */}
                <div style={{ marginTop:12, padding:"13px 14px", background:"rgba(255,255,255,0.4)", borderRadius:13, border:"1.5px solid rgba(255,255,255,0.6)" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div style={{ fontSize:11, color:"#6B5E4A" }}>
                      {filterPerson === "Me" ? "Your budget" : filterPerson === otherName ? `${otherName}'s budget` : "Combined budget"}
                    </div>
                    <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:17, color:"#2A2219" }}>
                      ${(filterPerson === "Me" ? totalMyBudget : filterPerson === otherName ? totalOtherBudget : totalCombinedBudget).toLocaleString()}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ── TRANSACTIONS ── */}
            {activeTab === "transactions" && (
              <div>
                <SplitwisePanel
                  apiKey={apiKey} setApiKey={setApiKey}
                  yourId={yourId} setYourId={setYourId}
                  onSync={handleSync} syncing={syncing} syncStatus={syncStatus}
                  myLastSynced={myLastSynced} otherLastSynced={otherLastSynced}
                  myName={myName} otherName={otherName}
                  filteredTx={filteredTx} totalRaw={totalRaw} totalSpent={totalSpent} totalSaved={totalSaved}
                />

                {/* Search bar (Fix UX #13) */}
                <div style={{ margin:"14px 0 10px", position:"relative" }}>
                  <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", fontSize:14, color:"#9E907A" }}>🔍</span>
                  <input
                    value={searchQuery}
                    onChange={e => setSearchQuery(e.target.value)}
                    placeholder="Search transactions..."
                    style={{ width:"100%", padding:"9px 12px 9px 36px", borderRadius:10, border:"1.5px solid #D5CAB8", background:"rgba(255,255,255,0.7)", fontFamily:"'DM Mono',monospace", color:"#2A2219", outline:"none" }}
                  />
                  {searchQuery && (
                    <button onClick={() => setSearchQuery("")} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", fontSize:14, color:"#9E907A" }}>✕</button>
                  )}
                </div>

                {/* Transaction list header */}
                <div style={{ marginBottom:10, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div style={{ fontSize:11, color:"#8A7A68", letterSpacing:"0.08em" }}>{filteredTx.length} TRANSACTIONS</div>
                  <div style={{ fontSize:11, color:"#2D5A3D" }}>${totalSpent.toFixed(2)} actual</div>
                </div>

                <div style={{ background:"rgba(255,255,255,0.55)", borderRadius:14, overflow:"hidden", border:"1.5px solid rgba(255,255,255,0.6)" }}>
                  {sortedTx.length === 0 ? (
                    <div style={{ padding:"24px", textAlign:"center", color:"#9E907A", fontSize:12 }}>
                      {searchQuery ? `No transactions matching "${searchQuery}"` : "No transactions for this filter"}
                    </div>
                  ) : sortedTx.map((tx, i) => {
                    const cat       = CATEGORIES.find(c => c.id === tx.category);
                    const effective = getEffectiveAmount(tx);
                    return (
                      <div key={tx.id} className="tx-row" onClick={() => setEditingTx(tx)}
                        style={{ padding:"11px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:10, borderBottom: i < sortedTx.length-1 ? "1px solid rgba(200,191,176,0.35)" : "none", cursor:"pointer" }}>
                        <div style={{ display:"flex", gap:10, alignItems:"flex-start", flex:1, minWidth:0 }}>
                          <span style={{ fontSize:15, flexShrink:0, marginTop:2 }}>{cat?.icon || "💳"}</span>
                          <div style={{ minWidth:0 }}>
                            <div style={{ fontSize:12, color:"#2A2219", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                              {tx.desc}
                              {tx.manualEntry && <span style={{ marginLeft:6, fontSize:8, color:"#4A7C8E", background:"#E8F4F8", borderRadius:99, padding:"1px 5px" }}>manual</span>}
                              {tx.manualEdit && !tx.manualEntry && <span style={{ marginLeft:6, fontSize:8, color:"#8A6A2A", background:"#FDF0E0", borderRadius:99, padding:"1px 5px" }}>edited</span>}
                            </div>
                            <div style={{ fontSize:9, color:"#9E907A", marginTop:2 }}>{tx.date} · {tx.person}</div>
                            {tx.splitwiseId && !tx.manualEntry && <SplitBadge tx={tx} />}
                          </div>
                        </div>
                        <div style={{ textAlign:"right", flexShrink:0 }}>
                          <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:16, color:"#2A2219" }}>${effective.toFixed(2)}</div>
                          {tx.adjustedAmount != null && tx.adjustedAmount !== tx.amount && !tx.manualEdit && (
                            <div style={{ fontSize:9, color:"#9E907A", textDecoration:"line-through" }}>${tx.amount.toFixed(2)}</div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ── ADVISOR ── */}
            {activeTab === "advisor" && (
              <div className="card">
                {/* Income setup */}
                <div style={{ background:"rgba(255,255,255,0.55)", borderRadius:14, padding:"16px", marginBottom:12, border:"1.5px solid rgba(255,255,255,0.6)" }}>
                  <div style={{ fontSize:10, color:"#8A7A68", letterSpacing:"0.1em", marginBottom:12 }}>MONTHLY INCOME</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                    {[{ id:"aldrin", label:"Aldrin", color:PEOPLE.aldrin.color }, { id:"emily", label:"Emily", color:PEOPLE.emily.color }].map(p => (
                      <div key={p.id}>
                        <div style={{ fontSize:9, color:p.color, letterSpacing:"0.08em", marginBottom:4 }}>{p.label.toUpperCase()}</div>
                        <div style={{ position:"relative" }}>
                          <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", fontSize:12, color:"#9E907A" }}>$</span>
                          <input type="number" value={income[p.id] || ""} onChange={e => setIncome(prev => ({ ...prev, [p.id]: parseFloat(e.target.value) || 0 }))}
                            placeholder="0"
                            style={{ width:"100%", padding:"8px 10px 8px 22px", borderRadius:9, border:`1.5px solid ${p.color}40`, background:"#FAF7F2", fontFamily:"'DM Mono',monospace", color:"#2A2219", outline:"none" }} />
                        </div>
                      </div>
                    ))}
                  </div>
                  {totalIncome > 0 && (
                    <div style={{ marginTop:10, display:"flex", justifyContent:"space-between", fontSize:11, color:"#6B5E4A" }}>
                      <span>Combined: ${totalIncome.toLocaleString()}/mo</span>
                      <span style={{ color: totalIncome - totalSpent >= 0 ? "#2D5A3D" : "#C0392B" }}>
                        Net: {totalIncome - totalSpent >= 0 ? "+" : ""}${(totalIncome - totalSpent).toFixed(0)}/mo
                      </span>
                    </div>
                  )}
                </div>

                {/* Cash flow chart — 6-month bars */}
                {totalIncome > 0 && (
                  <div style={{ background:"rgba(255,255,255,0.55)", borderRadius:14, padding:"16px", marginBottom:12, border:"1.5px solid rgba(255,255,255,0.6)" }}>
                    <div style={{ fontSize:10, color:"#8A7A68", letterSpacing:"0.1em", marginBottom:14 }}>6-MONTH CASH FLOW</div>
                    <div style={{ display:"flex", gap:6, alignItems:"flex-end", height:80 }}>
                      {cashFlow.map(m => {
                        const maxVal  = Math.max(...cashFlow.map(x => Math.max(x.income, x.spend)), 1);
                        const incomePct = (m.income / maxVal) * 100;
                        const spendPct  = (m.spend  / maxVal) * 100;
                        const isOver    = m.spend > m.income;
                        return (
                          <div key={m.month} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
                            <div style={{ width:"100%", display:"flex", gap:2, alignItems:"flex-end", height:64 }}>
                              <div style={{ flex:1, background:"#A8D5B5", borderRadius:"3px 3px 0 0", height:`${incomePct}%`, minHeight:2 }} title={`Income $${m.income}`} />
                              <div style={{ flex:1, background: isOver ? "#E8A5A0" : "#C5A882", borderRadius:"3px 3px 0 0", height:`${spendPct}%`, minHeight:2 }} title={`Spend $${m.spend.toFixed(0)}`} />
                            </div>
                            <div style={{ fontSize:8, color:"#9E907A" }}>{m.label}</div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{ display:"flex", gap:14, marginTop:8, justifyContent:"center" }}>
                      <span style={{ fontSize:9, color:"#9E907A", display:"flex", alignItems:"center", gap:4 }}><span style={{ width:8, height:8, background:"#A8D5B5", borderRadius:2, display:"inline-block" }}/>Income</span>
                      <span style={{ fontSize:9, color:"#9E907A", display:"flex", alignItems:"center", gap:4 }}><span style={{ width:8, height:8, background:"#C5A882", borderRadius:2, display:"inline-block" }}/>Spend</span>
                    </div>
                  </div>
                )}

                {/* Recurring transactions */}
                {recurring.length > 0 && (
                  <div style={{ background:"rgba(255,255,255,0.55)", borderRadius:14, padding:"16px", marginBottom:12, border:"1.5px solid rgba(255,255,255,0.6)" }}>
                    <div style={{ fontSize:10, color:"#8A7A68", letterSpacing:"0.1em", marginBottom:10 }}>RECURRING BILLS DETECTED</div>
                    {recurring.slice(0, 6).map((r, i) => {
                      const cat = CATEGORIES.find(c => c.id === r.category);
                      return (
                        <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom: i < Math.min(recurring.length,6)-1 ? "1px solid rgba(200,191,176,0.3)" : "none" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                            <span style={{ fontSize:14 }}>{cat?.icon || "🔄"}</span>
                            <div>
                              <div style={{ fontSize:11, color:"#2A2219" }}>{r.desc}</div>
                              <div style={{ fontSize:9, color:"#9E907A" }}>{cat?.label} · {r.person}</div>
                            </div>
                          </div>
                          <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:15, color:"#2A2219" }}>~${r.avgAmount.toFixed(0)}/mo</div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* Month-end wrap-up — shown on 1st-3rd of month */}
                {now.getDate() <= 3 && (() => {
                  const prevMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                  const prevKey   = `${prevMonth.getFullYear()}-${String(prevMonth.getMonth()+1).padStart(2,"0")}`;
                  const prevLabel = prevMonth.toLocaleString("en-US", { month:"long" });
                  const prevTx    = transactions.filter(t => (t.date||"").startsWith(prevKey));
                  const prevSpend = prevTx.reduce((s, t) => s + getEffectiveAmount(t), 0);
                  const prevSaved = prevTx.reduce((s, t) => s + (t.splitwiseId ? t.amount - getEffectiveAmount(t) : 0), 0);
                  const overCats  = CATEGORIES.filter(c => {
                    const sp = prevTx.filter(t => t.category === c.id).reduce((s, t) => s + getEffectiveAmount(t), 0);
                    return sp > combinedBudget(c.id);
                  });
                  const underCats = CATEGORIES.filter(c => {
                    const sp = prevTx.filter(t => t.category === c.id).reduce((s, t) => s + getEffectiveAmount(t), 0);
                    return sp > 0 && sp <= combinedBudget(c.id);
                  });
                  if (!prevTx.length) return null;
                  return (
                    <div style={{ background:"linear-gradient(135deg,#EAF4ED,#F0EBE1)", borderRadius:14, padding:"16px", marginBottom:12, border:"1.5px solid #A8D5B5" }}>
                      <div style={{ fontSize:10, color:"#2D5A3D", letterSpacing:"0.1em", marginBottom:8 }}>✦ {prevLabel.toUpperCase()} WRAP-UP</div>
                      <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:18, color:"#2A2219", marginBottom:6 }}>
                        ${prevSpend.toFixed(0)} spent · {underCats.length} of {CATEGORIES.length} categories under budget
                      </div>
                      {prevSaved > 0 && <div style={{ fontSize:11, color:"#2D5A3D", marginBottom:4 }}>⚡ Saved ${prevSaved.toFixed(0)} via Splitwise</div>}
                      {overCats.length > 0 && <div style={{ fontSize:11, color:"#C87A2A" }}>↑ Over in: {overCats.map(c => c.label.split(" ")[0]).join(", ")}</div>}
                    </div>
                  );
                })()}

                {/* Adaptive budget suggestions */}
                {(() => {
                  const suggestions = CATEGORIES.map(c => {
                    const monthsWithData = MONTH_OPTIONS.slice(1, 4).map(m => {
                      const sp = transactions
                        .filter(t => t.category === c.id && (t.date||"").startsWith(m.value))
                        .reduce((s, t) => s + getEffectiveAmount(t), 0);
                      return sp;
                    }).filter(v => v > 0);
                    if (monthsWithData.length < 2) return null;
                    const avg = monthsWithData.reduce((s,v) => s+v, 0) / monthsWithData.length;
                    const current = combinedBudget(c.id);
                    if (Math.abs(avg - current) < current * 0.1) return null; // within 10%, no suggestion
                    return { cat:c, avg, current, higher: avg > current };
                  }).filter(Boolean);

                  if (!suggestions.length) return null;
                  return (
                    <div style={{ background:"rgba(255,255,255,0.55)", borderRadius:14, padding:"16px", marginBottom:12, border:"1.5px solid #E8C87A" }}>
                      <div style={{ fontSize:10, color:"#8A6A2A", letterSpacing:"0.1em", marginBottom:10 }}>💡 BUDGET SUGGESTIONS</div>
                      {suggestions.slice(0,3).map((s, i) => (
                        <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom: i < suggestions.length-1 ? "1px solid rgba(200,191,176,0.3)" : "none" }}>
                          <div>
                            <div style={{ fontSize:11, color:"#2A2219" }}>{s.cat.icon} {s.cat.label}</div>
                            <div style={{ fontSize:9, color:"#9E907A" }}>
                              Avg last 3 months: ${s.avg.toFixed(0)} · Budget: ${s.current.toLocaleString()}
                            </div>
                          </div>
                          <button onClick={() => { updateBudget("aldrin", s.cat.id, Math.round(s.avg * 0.6)); updateBudget("emily", s.cat.id, Math.round(s.avg * 0.4)); showToast(`Budget updated for ${s.cat.label.split(" ")[0]}`); }}
                            style={{ padding:"5px 10px", borderRadius:8, border:"1.5px solid #E8C87A", background:"#FDF4E7", color:"#8A6A2A", fontSize:9, cursor:"pointer", fontFamily:"'DM Mono',monospace", flexShrink:0, marginLeft:8 }}>
                            Update to ${s.avg.toFixed(0)}
                          </button>
                        </div>
                      ))}
                    </div>
                  );
                })()}

                {/* Quick stats */}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:9, marginBottom:14 }}>
                  {[
                    { label:"Transactions", val:filteredTx.length },
                    { label:"Adjusted",     val:splitwiseCount },
                    { label:"Over Budget",  val:CATEGORIES.filter(c => (categorySpend[c.id]||0) > combinedBudget(c.id)).length },
                  ].map(s => (
                    <div key={s.label} style={{ background:"rgba(255,255,255,0.55)", borderRadius:12, padding:"12px", textAlign:"center", border:"1.5px solid rgba(255,255,255,0.6)" }}>
                      <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:22, color:"#2A2219" }}>{s.val}</div>
                      <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.06em" }}>{s.label.toUpperCase()}</div>
                    </div>
                  ))}
                </div>

                <AIAdvisor
                  transactions={filteredTx}
                  budgets={Object.fromEntries(CATEGORIES.map(c => [c.id, combinedBudget(c.id)]))}
                  categorySpend={categorySpend}
                  income={income}
                  recurring={recurring}
                />
              </div>
            )}

            {/* ── SETTLE UP ── */}
            {activeTab === "settleup" && (() => {
              // Calculate who owes who across ALL joint transactions
              // Logic: joint tx paid by Aldrin → Emily owes half (and vice versa)
              // Manual joint tx split 50/50. Splitwise-adjusted tx use their shares.
              let aldrinOwesEmily = 0;
              let emilyOwesAldrin = 0;

              transactions
                .filter(t => (t.date||"").startsWith(filterMonth) || filterMonth === "all")
                .filter(t => t.person === "Joint")
                .forEach(tx => {
                  const effective = getEffectiveAmount(tx);
                  const half = effective / 2;
                  // If Splitwise already handled it, the adjusted amount IS your share — no further split needed
                  if (tx.splitwiseId) return;
                  // For manual joint transactions, split 50/50
                  // We don't know who paid, so we track net flows per category
                  // Heuristic: transactions tagged Aldrin-paid → Emily owes half
                  if (tx.paidBy === "aldrin") emilyOwesAldrin += half;
                  else if (tx.paidBy === "emily") aldrinOwesEmily += half;
                  else aldrinOwesEmily += half; // default: assume Aldrin paid
                });

              const net = aldrinOwesEmily - emilyOwesAldrin;
              const owingPerson  = net > 0 ? "Emily"  : "Aldrin";
              const owedPerson   = net > 0 ? "Aldrin" : "Emily";
              const owingColor   = net > 0 ? PEOPLE.emily.color : PEOPLE.aldrin.color;
              const absNet       = Math.abs(net);

              // Per-category joint breakdown
              const jointByCategory = CATEGORIES.map(c => {
                const txs  = transactions.filter(t => t.person === "Joint" && t.category === c.id && ((t.date||"").startsWith(filterMonth) || filterMonth === "all"));
                const total = txs.reduce((s, t) => s + getEffectiveAmount(t), 0);
                return { cat:c, total, txs };
              }).filter(c => c.total > 0);

              const totalJoint = jointByCategory.reduce((s, c) => s + c.total, 0);

              // Category rules editor state
              const [editingRule, setEditingRule] = useState(null);

              return (
                <div className="card">
                  {/* Net balance card */}
                  <div style={{ background: absNet < 1 ? "linear-gradient(135deg,#EAF4ED,#F0EBE1)" : "rgba(255,255,255,0.6)", borderRadius:16, padding:"20px", marginBottom:14, border:`1.5px solid ${absNet < 1 ? "#A8D5B5" : "rgba(255,255,255,0.6)"}`, textAlign:"center" }}>
                    {absNet < 1 ? (
                      <>
                        <div style={{ fontSize:28, marginBottom:6 }}>✓</div>
                        <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:22, color:"#2D5A3D" }}>You're all settled up</div>
                        <div style={{ fontSize:11, color:"#6B8F71", marginTop:4 }}>No outstanding balance for {MONTH_OPTIONS.find(m => m.value === filterMonth)?.label || "this period"}</div>
                      </>
                    ) : (
                      <>
                        <div style={{ fontSize:11, color:"#8A7A68", letterSpacing:"0.1em", marginBottom:6 }}>OUTSTANDING BALANCE</div>
                        <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:36, color:owingColor, marginBottom:4 }}>${absNet.toFixed(2)}</div>
                        <div style={{ fontSize:13, color:"#6B5E4A" }}>{owingPerson} owes {owedPerson}</div>
                        <button style={{ marginTop:12, padding:"9px 20px", borderRadius:10, border:"none", background:"#2D5A3D", color:"#F5F0E8", fontFamily:"'DM Mono',monospace", fontSize:11, cursor:"pointer", letterSpacing:"0.06em" }}
                          onClick={() => showToast("Marked as settled ✓")}>
                          Mark as Settled
                        </button>
                      </>
                    )}
                  </div>

                  {/* Joint spending breakdown */}
                  <div style={{ background:"rgba(255,255,255,0.55)", borderRadius:14, padding:"16px", marginBottom:14, border:"1.5px solid rgba(255,255,255,0.6)" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                      <div style={{ fontSize:10, color:"#8A7A68", letterSpacing:"0.1em" }}>JOINT EXPENSES</div>
                      <div style={{ fontSize:11, color:"#2A2219", fontFamily:"'Crimson Pro',serif" }}>${totalJoint.toFixed(2)} total</div>
                    </div>
                    {jointByCategory.length === 0 ? (
                      <div style={{ textAlign:"center", color:"#9E907A", fontSize:12, padding:"16px 0" }}>No joint transactions this period</div>
                    ) : jointByCategory.map((item, i) => (
                      <div key={item.cat.id} style={{ padding:"10px 0", borderBottom: i < jointByCategory.length-1 ? "1px solid rgba(200,191,176,0.3)" : "none" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                            <span style={{ fontSize:16 }}>{item.cat.icon}</span>
                            <div>
                              <div style={{ fontSize:11, color:"#2A2219" }}>{item.cat.label}</div>
                              <div style={{ fontSize:9, color:"#9E907A" }}>{item.txs.length} transactions · each owes ${(item.total/2).toFixed(2)}</div>
                            </div>
                          </div>
                          <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:16, color:"#2A2219" }}>${item.total.toFixed(2)}</div>
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* Category rules engine */}
                  <div style={{ background:"rgba(255,255,255,0.55)", borderRadius:14, padding:"16px", border:"1.5px solid rgba(255,255,255,0.6)" }}>
                    <div style={{ fontSize:10, color:"#8A7A68", letterSpacing:"0.1em", marginBottom:4 }}>AUTO-CATEGORIZATION RULES</div>
                    <div style={{ fontSize:11, color:"#9E907A", marginBottom:12, lineHeight:1.6 }}>
                      Set rules so merchants are always categorized correctly.
                    </div>
                    {Object.entries(catRules).length === 0 && !editingRule ? (
                      <div style={{ textAlign:"center", color:"#9E907A", fontSize:11, padding:"12px 0" }}>No rules yet — add one below</div>
                    ) : (
                      <div style={{ marginBottom:12 }}>
                        {Object.entries(catRules).map(([merchant, catId]) => {
                          const cat = CATEGORIES.find(c => c.id === catId);
                          return (
                            <div key={merchant} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0", borderBottom:"1px solid rgba(200,191,176,0.2)" }}>
                              <div style={{ fontSize:11, color:"#2A2219" }}>{merchant}</div>
                              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                                <span style={{ fontSize:10, color:cat?.color, background:cat?.color+"18", borderRadius:99, padding:"2px 8px" }}>{cat?.icon} {cat?.label.split(" ")[0]}</span>
                                <button onClick={() => { const r = {...catRules}; delete r[merchant]; setCatRules(r); }} style={{ background:"none", border:"none", color:"#C0392B", cursor:"pointer", fontSize:12 }}>✕</button>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                    {/* Add rule */}
                    {editingRule ? (
                      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                        <input value={editingRule.merchant || ""} onChange={e => setEditingRule(r => ({...r, merchant: e.target.value}))}
                          placeholder="Merchant name (e.g. Deliveroo)"
                          style={{ padding:"8px 12px", borderRadius:9, border:"1.5px solid #D5CAB8", background:"#fff", fontFamily:"'DM Mono',monospace", color:"#2A2219", outline:"none" }} />
                        <select value={editingRule.catId || "groceries"} onChange={e => setEditingRule(r => ({...r, catId: e.target.value}))}
                          style={{ padding:"8px 12px", borderRadius:9, border:"1.5px solid #D5CAB8", background:"#fff", fontFamily:"'DM Mono',monospace", color:"#2A2219", outline:"none" }}>
                          {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
                        </select>
                        <div style={{ display:"flex", gap:8 }}>
                          <button onClick={() => {
                            if (editingRule.merchant?.trim()) {
                              setCatRules(prev => ({ ...prev, [editingRule.merchant.trim()]: editingRule.catId || "groceries" }));
                              showToast(`Rule saved for ${editingRule.merchant}`);
                            }
                            setEditingRule(null);
                          }} style={{ flex:1, padding:"9px", borderRadius:9, border:"none", background:"#2D5A3D", color:"#F5F0E8", fontFamily:"'DM Mono',monospace", fontSize:12, cursor:"pointer" }}>Save Rule</button>
                          <button onClick={() => setEditingRule(null)} style={{ padding:"9px 14px", borderRadius:9, border:"1.5px solid #D5CAB8", background:"transparent", color:"#6B5E4A", fontFamily:"'DM Mono',monospace", fontSize:12, cursor:"pointer" }}>Cancel</button>
                        </div>
                      </div>
                    ) : (
                      <button onClick={() => setEditingRule({ merchant:"", catId:"groceries" })}
                        style={{ width:"100%", padding:"9px", borderRadius:9, border:"1.5px dashed #D5CAB8", background:"transparent", color:"#6B5E4A", fontFamily:"'DM Mono',monospace", fontSize:11, cursor:"pointer" }}>
                        + Add Rule
                      </button>
                    )}
                  </div>
                </div>
              );
            })()}

          </div>{/* end content */}

          {/* BOTTOM NAV — 4 tabs + FAB */}
          <div style={{ position:"fixed", bottom:0, left:0, right:0, zIndex:200, background:"rgba(250,247,242,0.96)", backdropFilter:"blur(10px)", borderTop:"1px solid #D5CAB8", paddingBottom:`max(env(safe-area-inset-bottom), 8px)` }}>
            <div style={{ maxWidth:480, margin:"0 auto", display:"flex", alignItems:"center", padding:"6px 8px 2px", position:"relative" }}>
              <button onClick={() => setActiveTab("overview")} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2, padding:"6px 0", background:"none", border:"none", cursor:"pointer", color: activeTab==="overview" ? "#2D5A3D" : "#9E907A" }}>
                <span style={{ fontSize:20 }}>📊</span>
                <span style={{ fontSize:8, fontFamily:"'DM Mono',monospace", letterSpacing:"0.04em" }}>OVERVIEW</span>
              </button>

              <button onClick={() => setActiveTab("transactions")} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2, padding:"6px 0", background:"none", border:"none", cursor:"pointer", color: activeTab==="transactions" ? "#2D5A3D" : "#9E907A" }}>
                <span style={{ fontSize:20 }}>💳</span>
                <span style={{ fontSize:8, fontFamily:"'DM Mono',monospace", letterSpacing:"0.04em" }}>TRANSACTIONS</span>
              </button>

              {/* FAB */}
              <div style={{ flex:"0 0 64px", display:"flex", justifyContent:"center" }}>
                <button onClick={() => setAddingTx(true)}
                  style={{ width:52, height:52, borderRadius:99, background:"#2D5A3D", color:"#F5F0E8", border:"none", fontSize:26, cursor:"pointer", boxShadow:"0 4px 16px rgba(45,90,61,0.4)", display:"flex", alignItems:"center", justifyContent:"center", marginTop:-20 }}>
                  +
                </button>
              </div>

              <button onClick={() => setActiveTab("settleup")} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2, padding:"6px 0", background:"none", border:"none", cursor:"pointer", color: activeTab==="settleup" ? "#2D5A3D" : "#9E907A" }}>
                <span style={{ fontSize:20 }}>🤝</span>
                <span style={{ fontSize:8, fontFamily:"'DM Mono',monospace", letterSpacing:"0.04em" }}>SETTLE UP</span>
              </button>

              <button onClick={() => setActiveTab("advisor")} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2, padding:"6px 0", background:"none", border:"none", cursor:"pointer", color: activeTab==="advisor" ? "#2D5A3D" : "#9E907A" }}>
                <span style={{ fontSize:20 }}>🌿</span>
                <span style={{ fontSize:8, fontFamily:"'DM Mono',monospace", letterSpacing:"0.04em" }}>ADVISOR</span>
              </button>
            </div>
          </div>

          {/* MODALS */}
          {editingTx && (
            <TransactionForm
              title="Edit Transaction"
              initial={editingTx}
              onSave={(changes) => updateTransaction(editingTx.id, { ...changes, manualEdit: true })}
              onDelete={() => deleteTransaction(editingTx.id)}
              onClose={() => setEditingTx(null)}
            />
          )}
          {addingTx && (
            <TransactionForm
              title="Add Transaction"
              onSave={(data) => addTransaction({
                id: `manual-${Date.now()}`,
                ...data,
                adjustedAmount: null,
                splitwiseId: null,
                manualEdit: true,
                manualEntry: true,
              })}
              onClose={() => setAddingTx(false)}
            />
          )}

          {/* Toast notification */}
          <Toast message={toast} />

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
