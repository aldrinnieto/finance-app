<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You & Emily · Finance</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F0E8; font-family: 'DM Mono', monospace; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px) } to { opacity:1; transform:translateY(0) } }
    @keyframes spin   { from { transform:rotate(0deg) } to { transform:rotate(360deg) } }
    .card { animation: fadeUp 0.4s ease both; }
    .tx-row:hover { background: rgba(255,255,255,0.5) !important; }
    input::-webkit-inner-spin-button { -webkit-appearance:none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    const PROXY_URL = "https://splitwise-proxy.onrender.com";

    const CATEGORIES = [
      { id:"groceries",     label:"Groceries & Dining",            icon:"🛒", color:"#6B8F71", budget:800  },
      { id:"transport",     label:"Travel & Transport",            icon:"✈️", color:"#8B7355", budget:400  },
      { id:"entertainment", label:"Entertainment & Subscriptions", icon:"🎬", color:"#7A6B8A", budget:200  },
      { id:"rent",          label:"Rent & Utilities",              icon:"🏠", color:"#4A7C8E", budget:2200 },
      { id:"savings",       label:"Savings & Investments",         icon:"📈", color:"#2D5A3D", budget:1000 },
      { id:"shopping",      label:"Personal Shopping",             icon:"🛍️", color:"#A0785A", budget:300  },
    ];

    const SAMPLE = [
      { id:1,  desc:"Whole Foods Market", amount:127.43, adjustedAmount:null, category:"groceries",     date:"2025-03-01", person:"Joint", splitwiseId:null },
      { id:2,  desc:"Monthly Rent",       amount:2100,   adjustedAmount:null, category:"rent",          date:"2025-03-01", person:"Joint", splitwiseId:null },
      { id:3,  desc:"Netflix + Spotify",  amount:28.97,  adjustedAmount:null, category:"entertainment", date:"2025-03-02", person:"Emily", splitwiseId:null },
      { id:4,  desc:"Dinner for 4",       amount:240,    adjustedAmount:60,   category:"groceries",     date:"2025-03-03", person:"You",   splitwiseId:"sw-demo-1" },
      { id:5,  desc:"Electricity Bill",   amount:98.20,  adjustedAmount:null, category:"rent",          date:"2025-03-04", person:"Joint", splitwiseId:null },
      { id:6,  desc:"Zara",               amount:89.95,  adjustedAmount:null, category:"shopping",      date:"2025-03-05", person:"Emily", splitwiseId:null },
      { id:7,  desc:"Deliveroo",          amount:38.60,  adjustedAmount:null, category:"groceries",     date:"2025-03-06", person:"You",   splitwiseId:null },
      { id:8,  desc:"Vanguard 401k",      amount:500,    adjustedAmount:null, category:"savings",       date:"2025-03-07", person:"Joint", splitwiseId:null },
      { id:9,  desc:"Weekend trip hotel", amount:380,    adjustedAmount:95,   category:"transport",     date:"2025-03-08", person:"Emily", splitwiseId:"sw-demo-2" },
      { id:10, desc:"Uber",               amount:19.80,  adjustedAmount:null, category:"transport",     date:"2025-03-09", person:"Emily", splitwiseId:null },
      { id:11, desc:"Movie night for 3",  amount:94.50,  adjustedAmount:31.5, category:"entertainment", date:"2025-03-10", person:"You",   splitwiseId:"sw-demo-3" },
      { id:12, desc:"Whole Foods",        amount:94.20,  adjustedAmount:null, category:"groceries",     date:"2025-03-11", person:"Joint", splitwiseId:null },
      { id:13, desc:"Amazon Prime",       amount:8.99,   adjustedAmount:null, category:"entertainment", date:"2025-03-12", person:"Joint", splitwiseId:null },
      { id:14, desc:"ASOS",               amount:145,    adjustedAmount:null, category:"shopping",      date:"2025-03-13", person:"You",   splitwiseId:null },
      { id:15, desc:"TfL Monthly",        amount:172,    adjustedAmount:null, category:"transport",     date:"2025-03-14", person:"You",   splitwiseId:null },
    ];

    // ── SPLITWISE ──────────────────────────────────────────────────────────────
    async function fetchSplitwise(apiKey, yourUserId) {
      const datedAfter = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split("T")[0];
      const res = await fetch(`${PROXY_URL}/splitwise/get_expenses?limit=100&dated_after=${datedAfter}`, {
        headers: { "x-splitwise-key": apiKey }
      });
      if (!res.ok) throw new Error(`Status ${res.status}`);
      const data = await res.json();
      return (data.expenses || [])
        .filter(e => !e.payment && !e.deleted_at)
        .map(e => {
          const me = (e.users || []).find(u => u.user_id === yourUserId);
          return {
            id: e.id,
            description: e.description,
            date: (e.date || "").split("T")[0],
            totalCost: parseFloat(e.cost) || 0,
            yourShare: parseFloat(me && me.owed_share) || 0,
            paidByYou: parseFloat(me && me.paid_share) > 0,
          };
        })
        .filter(e => e.yourShare > 0);
    }

    function matchAndAdjust(transactions, sw) {
      if (!sw.length) return transactions;
      return transactions.map(tx => {
        const match = sw.find(s => {
          const diff = Math.abs((new Date(s.date) - new Date(tx.date)) / 86400000);
          return Math.abs(s.totalCost - tx.amount) < 1.0 && diff <= 3;
        });
        return match ? { ...tx, adjustedAmount: match.yourShare, splitwiseId: `sw-${match.id}` } : tx;
      });
    }

    // ── PARSING ────────────────────────────────────────────────────────────────
    function guessCategory(desc) {
      const d = desc.toLowerCase();
      if (/grocery|whole foods|trader joe|kroger|safeway|restaurant|cafe|coffee|pizza|burger|sushi|doordash|ubereats|grubhub|deliveroo|starbucks|chipotle|mcdonald/.test(d)) return "groceries";
      if (/netflix|spotify|hulu|disney|hbo|apple tv|amazon prime|cinema|movie|theater|gaming|steam/.test(d)) return "entertainment";
      if (/uber|lyft|taxi|metro|subway|train|flight|airline|delta|united|southwest|airbnb|hotel|parking|gas station|shell/.test(d)) return "transport";
      if (/rent|mortgage|electricity|electric|gas bill|water|internet|broadband|utility|insurance/.test(d)) return "rent";
      if (/vanguard|fidelity|schwab|401k|ira|invest|stock|etf|savings/.test(d)) return "savings";
      if (/amazon|asos|zara|h&m|gap|nike|apple store|best buy|walmart|shopping|clothes/.test(d)) return "shopping";
      return "groceries";
    }

    function parseCSV(text) {
      const lines = text.trim().split("\n");
      const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
      return lines.slice(1).map((line, i) => {
        const vals = line.split(",").map(v => v.trim().replace(/^"|"$/g, ""));
        const obj = {};
        headers.forEach((h, idx) => obj[h] = vals[idx]);
        const amount = parseFloat(obj.amount || obj.debit || obj.credit || 0);
        const desc = obj.description || obj.desc || obj.merchant || obj.narrative || "Unknown";
        const date = obj.date || new Date().toISOString().split("T")[0];
        return { id: Date.now() + i, desc, amount: Math.abs(amount), adjustedAmount: null, category: guessCategory(desc), date, person: "Imported", splitwiseId: null };
      }).filter(t => t.amount > 0);
    }

    // ── COMPONENTS ─────────────────────────────────────────────────────────────
    function SpendBar({ spent, budget, color }) {
      const pct = Math.min((spent / budget) * 100, 100);
      return (
        <div style={{ background:"#E8E0D4", borderRadius:99, height:6, overflow:"hidden", marginTop:6 }}>
          <div style={{ height:"100%", borderRadius:99, width:`${pct}%`, background: spent > budget ? "#C0392B" : color, transition:"width 0.8s cubic-bezier(.4,0,.2,1)" }} />
        </div>
      );
    }

    function Badge({ tx }) {
      if (!tx.splitwiseId) return null;
      const saved = (tx.amount - (tx.adjustedAmount != null ? tx.adjustedAmount : tx.amount)).toFixed(2);
      return (
        <span style={{ display:"inline-flex", alignItems:"center", gap:4, background:"#EAF4ED", color:"#2D5A3D", borderRadius:99, fontSize:9, padding:"2px 7px", fontWeight:500, marginTop:3 }}>
          ⚡ Splitwise · saved ${saved}
        </span>
      );
    }

    function SplitwisePanel({ apiKey, setApiKey, yourId, setYourId, emilyId, setEmilyId, onSync, syncing, syncStatus, filteredTx, totalRaw, totalSpent, totalSaved }) {
      const [open, setOpen] = useState(false);
      const configured = apiKey && yourId;
      const adjusted = filteredTx.filter(t => t.splitwiseId);
      return (
        <div className="card">
          <div onClick={() => setOpen(o => !o)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background: configured ? "#EAF4ED" : "#FDF5EC", border:`1.5px solid ${configured ? "#A8D5B5" : "#E8C87A"}`, borderRadius: open ? "14px 14px 0 0" : 14, padding:"14px 16px", cursor:"pointer" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:20 }}>⚡</span>
              <div>
                <div style={{ fontSize:12, color:"#2A2219", fontWeight:500 }}>Splitwise Integration</div>
                <div style={{ fontSize:10, color: configured ? "#2D5A3D" : "#8A6A2A" }}>{configured ? "Connected · tap to manage" : "Not configured · tap to set up"}</div>
              </div>
            </div>
            <span style={{ fontSize:13, color:"#9E907A" }}>{open ? "▲" : "▼"}</span>
          </div>
          {open && (
            <div style={{ background:"rgba(255,255,255,0.7)", borderRadius:"0 0 14px 14px", border:"1.5px solid #D5CAB8", borderTop:"none", padding:"16px", marginBottom:16 }}>
              <div style={{ fontSize:11, color:"#6B5E4A", lineHeight:1.7, marginBottom:14 }}>Enter your Splitwise credentials to auto-adjust shared expenses.</div>
              {[
                { label:"API KEY",         val:apiKey,  set:setApiKey,                              ph:"paste your API key..." },
                { label:"YOUR USER ID",    val:yourId,  set:v => setYourId(v ? parseInt(v) : null),  ph:"e.g. 12345678" },
                { label:"EMILY'S USER ID", val:emilyId, set:v => setEmilyId(v ? parseInt(v) : null), ph:"e.g. 87654321 (optional)" },
              ].map(f => (
                <div key={f.label} style={{ marginBottom:12 }}>
                  <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.1em", marginBottom:4 }}>{f.label}</div>
                  <input value={f.val || ""} onChange={e => f.set(e.target.value)} placeholder={f.ph}
                    style={{ width:"100%", padding:"8px 12px", borderRadius:8, border:"1.5px solid #D5CAB8", background:"#FAF7F2", fontFamily:"'DM Mono',monospace", fontSize:11, color:"#2A2219", outline:"none" }} />
                </div>
              ))}
              <button onClick={onSync} disabled={syncing || !apiKey || !yourId}
                style={{ width:"100%", padding:"10px", borderRadius:10, border:"none", background: syncing ? "#9AB5A0" : "#2D5A3D", color:"#F5F0E8", fontFamily:"'DM Mono',monospace", fontSize:11, cursor: syncing ? "not-allowed" : "pointer", letterSpacing:"0.08em" }}>
                {syncing ? "⟳ Syncing..." : "⚡ Sync Splitwise Now"}
              </button>
              {syncStatus && <div style={{ marginTop:10, fontSize:11, color: syncStatus.startsWith("✓") ? "#2D5A3D" : "#C0392B", textAlign:"center" }}>{syncStatus}</div>}
            </div>
          )}
          <div style={{ background:"rgba(255,255,255,0.55)", borderRadius:16, padding:"18px 20px", border:"1.5px solid rgba(255,255,255,0.6)", marginBottom:14, marginTop:14 }}>
            <div style={{ fontSize:11, color:"#8A7A68", letterSpacing:"0.08em", marginBottom:14 }}>THIS MONTH'S ADJUSTMENTS</div>
            {adjusted.length === 0 ? (
              <div style={{ fontSize:12, color:"#9E907A", textAlign:"center", padding:"16px 0", lineHeight:1.8 }}>
                No adjustments yet.<br /><span style={{ fontSize:10 }}>Connect above, then sync.</span>
              </div>
            ) : adjusted.map((tx, i) => (
              <div key={tx.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", padding:"10px 0", borderBottom: i < adjusted.length-1 ? "1px solid rgba(200,191,176,0.4)" : "none" }}>
                <div>
                  <div style={{ fontSize:12, color:"#2A2219" }}>{tx.desc}</div>
                  <div style={{ fontSize:10, color:"#9E907A", marginTop:2 }}>{tx.date} · {tx.person}</div>
                  <Badge tx={tx} />
                </div>
                <div style={{ textAlign:"right", flexShrink:0, marginLeft:12 }}>
                  <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:18, color:"#2A2219" }}>${(tx.adjustedAmount != null ? tx.adjustedAmount : tx.amount).toFixed(2)}</div>
                  <div style={{ fontSize:10, color:"#9E907A", textDecoration:"line-through" }}>${tx.amount.toFixed(2)}</div>
                </div>
              </div>
            ))}
          </div>
          {adjusted.length > 0 && (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              {[
                { label:"RAW BANK SPEND",    val:`$${totalRaw.toFixed(2)}`,   sub:"from statements" },
                { label:"YOUR ACTUAL SHARE", val:`$${totalSpent.toFixed(2)}`, sub:`$${totalSaved.toFixed(2)} offset` },
              ].map(s => (
                <div key={s.label} style={{ background:"rgba(255,255,255,0.55)", borderRadius:14, padding:"14px", border:"1.5px solid rgba(255,255,255,0.6)" }}>
                  <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.08em", marginBottom:6 }}>{s.label}</div>
                  <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:20, color:"#2A2219" }}>{s.val}</div>
                  <div style={{ fontSize:10, color:"#6B5E4A", marginTop:2 }}>{s.sub}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function AIAdvisor({ transactions, budgets, categorySpend }) {
      const [advice, setAdvice] = useState("");
      const [loading, setLoading] = useState(false);
      const [open, setOpen] = useState(false);
      const eff = tx => tx.adjustedAmount != null ? tx.adjustedAmount : tx.amount;
      const swSavings = transactions.reduce((s, t) => s + (t.splitwiseId ? (t.amount - eff(t)) : 0), 0);

      const getAdvice = async () => {
        setLoading(true); setOpen(true);
        const totalSpent = transactions.reduce((s, t) => s + eff(t), 0);
        const totalBudget = CATEGORIES.reduce((s, c) => s + (budgets[c.id] || c.budget), 0);
        const summary = CATEGORIES.map(c => {
          const spent = transactions.filter(t => t.category === c.id).reduce((s, t) => s + eff(t), 0);
          return `${c.label}: $${spent.toFixed(2)} of $${budgets[c.id] || c.budget}`;
        }).join("; ");
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
              model:"claude-sonnet-4-20250514", max_tokens:1000,
              system:`You are a warm personal financial advisor for Emily and her partner. All figures are Splitwise-adjusted (real shares). Be specific and practical. American English. Format: overall assessment, 2-3 observations, 1-2 tips. Under 250 words. Human tone.`,
              messages:[{ role:"user", content:`Spent (adjusted): $${totalSpent.toFixed(2)} vs $${totalBudget} budget. Splitwise offset: $${swSavings.toFixed(2)}. Breakdown: ${summary}` }]
            })
          });
          const data = await res.json();
          setAdvice(data.content && data.content.map(b => b.text).join("") || "Unable to get advice right now.");
        } catch(e) { setAdvice("Having trouble connecting. Please try again."); }
        setLoading(false);
      };

      return (
        <div>
          <button onClick={getAdvice} style={{ background:"#2D5A3D", color:"#F5F0E8", border:"none", borderRadius:12, padding:"12px 24px", fontFamily:"'DM Mono',monospace", fontSize:13, cursor:"pointer", letterSpacing:"0.05em", width:"100%", opacity: loading ? 0.7 : 1 }}>
            {loading ? "Consulting your advisor..." : "✦ Ask Your Financial Advisor"}
          </button>
          {open && (
            <div style={{ marginTop:16, background:"#F0EBE1", borderRadius:16, padding:"20px 24px", borderLeft:"3px solid #2D5A3D", fontFamily:"'Crimson Pro',Georgia,serif", fontSize:16, lineHeight:1.7, color:"#2A2219", whiteSpace:"pre-wrap" }}>
              {loading
                ? <div style={{ display:"flex", alignItems:"center", gap:10, color:"#6B5E4A" }}><span style={{ animation:"spin 1s linear infinite", display:"inline-block" }}>◌</span> Reviewing your finances...</div>
                : advice}
            </div>
          )}
        </div>
      );
    }

    // ── MAIN APP ───────────────────────────────────────────────────────────────
    function App() {
      const [transactions, setTransactions] = useState(SAMPLE);
      const [budgets, setBudgets]           = useState(Object.fromEntries(CATEGORIES.map(c => [c.id, c.budget])));
      const [activeTab, setActiveTab]       = useState("overview");
      const [uploadMsg, setUploadMsg]       = useState("");
      const [editBudget, setEditBudget]     = useState(null);
      const [filterPerson, setFilterPerson] = useState("All");
      const [apiKey, setApiKey]             = useState("");
      const [yourId, setYourId]             = useState(null);
      const [emilyId, setEmilyId]           = useState(null);
      const [syncing, setSyncing]           = useState(false);
      const [syncStatus, setSyncStatus]     = useState("");
      const [swExpenses, setSwExpenses]     = useState([]);
      const fileRef = useRef();

      useEffect(() => {
        if (swExpenses.length) setTransactions(prev => matchAndAdjust(prev, swExpenses));
      }, [swExpenses]);

      const handleSync = async () => {
        setSyncing(true); setSyncStatus("");
        try {
          const expenses = await fetchSplitwise(apiKey, yourId);
          if (!expenses.length) { setSyncStatus("⚠ No expenses returned. Check your API key and user ID."); }
          else { setSwExpenses(expenses); setSyncStatus(`✓ Synced ${expenses.length} Splitwise expenses`); }
        } catch(e) { setSyncStatus(`✗ Sync failed: ${e.message}`); }
        setSyncing(false);
      };

      const eff = tx => tx.adjustedAmount != null ? tx.adjustedAmount : tx.amount;

      const filteredTx = filterPerson === "All" ? transactions
        : transactions.filter(t => filterPerson === "Joint" ? t.person === "Joint" : t.person === filterPerson);

      const totalSpent  = filteredTx.reduce((s, t) => s + eff(t), 0);
      const totalRaw    = filteredTx.reduce((s, t) => s + t.amount, 0);
      const totalSaved  = totalRaw - totalSpent;
      const totalBudget = CATEGORIES.reduce((s, c) => s + budgets[c.id], 0);
      const remaining   = totalBudget - totalSpent;
      const categorySpend = Object.fromEntries(CATEGORIES.map(c => [c.id, filteredTx.filter(t => t.category === c.id).reduce((s, t) => s + eff(t), 0)]));
      const splitwiseCount = filteredTx.filter(t => t.splitwiseId).length;

      const handleFile = useCallback(async (file) => {
        setUploadMsg("Reading statement...");
        let parsed = null;
        if (file.name.endsWith(".csv")) { const text = await file.text(); parsed = parseCSV(text); }
        if (parsed && parsed.length) {
          const adj = swExpenses.length ? matchAndAdjust(parsed, swExpenses) : parsed;
          setTransactions(p => [...p, ...adj]);
          setUploadMsg(`✓ Imported ${parsed.length} transactions`);
        } else { setUploadMsg("⚠ Could not extract transactions. Try CSV format."); }
        setTimeout(() => setUploadMsg(""), 4000);
      }, [swExpenses]);

      const onDrop = useCallback(e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) handleFile(f); }, [handleFile]);

      const month = new Date().toLocaleString("en-US", { month:"long", year:"numeric" });
      const TABS  = ["overview","splitwise","ledger","advisor"];

      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(145deg,#F5F0E8 0%,#EDE5D8 50%,#E8DDD0 100%)", fontFamily:"'DM Mono','Courier New',monospace", paddingBottom:60 }}>

          {/* HEADER */}
          <div style={{ background:"linear-gradient(135deg,#2D5A3D 0%,#1A3A27 100%)", padding:"32px 24px 28px", color:"#F5F0E8", position:"sticky", top:0, zIndex:100 }}>
            <div style={{ maxWidth:480, margin:"0 auto" }}>
              <div style={{ fontSize:11, letterSpacing:"0.2em", opacity:0.6, marginBottom:4 }}>PRIVATE FINANCE</div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div>
                  <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:26, fontWeight:300 }}>You & Emily</div>
                  <div style={{ fontSize:11, opacity:0.55, marginTop:2 }}>{month}</div>
                </div>
                {splitwiseCount > 0 && (
                  <div style={{ background:"rgba(168,213,181,0.2)", border:"1px solid rgba(168,213,181,0.4)", borderRadius:10, padding:"6px 12px", textAlign:"right" }}>
                    <div style={{ fontSize:9, opacity:0.7, letterSpacing:"0.1em" }}>SPLITWISE</div>
                    <div style={{ fontSize:14, fontFamily:"'Crimson Pro',serif" }}>{splitwiseCount} adjusted</div>
                  </div>
                )}
              </div>
              <div style={{ marginTop:20, display:"flex", alignItems:"flex-end", gap:16, flexWrap:"wrap" }}>
                <div>
                  <div style={{ fontSize:11, opacity:0.55, letterSpacing:"0.12em", marginBottom:4 }}>ACTUAL SPENT</div>
                  <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:42, fontWeight:300, lineHeight:1 }}>
                    ${totalSpent.toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 })}
                  </div>
                </div>
                {totalSaved > 0.01 && (
                  <div style={{ paddingBottom:6, fontSize:11 }}>
                    <span style={{ opacity:0.4, textDecoration:"line-through" }}>${totalRaw.toFixed(0)}</span>
                    <span style={{ marginLeft:8, color:"#A8D5B5" }}>-${totalSaved.toFixed(0)} via Splitwise</span>
                  </div>
                )}
              </div>
              <div style={{ marginTop:14, background:"rgba(255,255,255,0.15)", borderRadius:99, height:4 }}>
                <div style={{ height:"100%", borderRadius:99, width:`${Math.min((totalSpent/totalBudget)*100,100)}%`, background: totalSpent > totalBudget ? "#E74C3C" : "#A8D5B5", transition:"width 1s ease" }} />
              </div>
              <div style={{ marginTop:8, fontSize:11, opacity:0.65 }}>
                {remaining >= 0 ? `$${remaining.toFixed(2)} remaining of $${totalBudget.toLocaleString()} budget` : `$${Math.abs(remaining).toFixed(2)} over budget`}
              </div>
            </div>
          </div>

          {/* PERSON FILTER */}
          <div style={{ maxWidth:480, margin:"0 auto", padding:"16px 24px 0" }}>
            <div style={{ display:"flex", gap:8 }}>
              {["All","You","Emily","Joint"].map(p => (
                <button key={p} onClick={() => setFilterPerson(p)} style={{ padding:"6px 14px", borderRadius:99, border:"1.5px solid", borderColor: filterPerson===p ? "#2D5A3D" : "#C8BFB0", background: filterPerson===p ? "#2D5A3D" : "transparent", color: filterPerson===p ? "#F5F0E8" : "#6B5E4A", fontSize:11, cursor:"pointer", letterSpacing:"0.06em", fontFamily:"'DM Mono',monospace", transition:"all 0.18s" }}>{p}</button>
              ))}
            </div>
          </div>

          {/* TABS */}
          <div style={{ maxWidth:480, margin:"0 auto", padding:"16px 24px 0" }}>
            <div style={{ display:"flex", borderBottom:"1.5px solid #D5CAB8" }}>
              {TABS.map(t => (
                <button key={t} onClick={() => setActiveTab(t)} style={{ flex:1, padding:"10px 4px", background:"none", border:"none", borderBottom: activeTab===t ? "2px solid #2D5A3D" : "2px solid transparent", color: activeTab===t ? "#2D5A3D" : "#9E907A", fontSize:9, letterSpacing:"0.08em", cursor:"pointer", fontFamily:"'DM Mono',monospace", textTransform:"uppercase", marginBottom:-1.5, transition:"all 0.18s", fontWeight: activeTab===t ? 500 : 400 }}>
                  {t==="splitwise" ? "⚡ Split" : t==="overview" ? "Overview" : t==="ledger" ? "Ledger" : "Advisor"}
                </button>
              ))}
            </div>
          </div>

          {/* CONTENT */}
          <div style={{ maxWidth:480, margin:"0 auto", padding:"20px 24px 0" }}>

            {/* OVERVIEW */}
            {activeTab === "overview" && (
              <div className="card">
                <div onDrop={onDrop} onDragOver={e => e.preventDefault()} onClick={() => fileRef.current.click()}
                  style={{ border:"1.5px dashed #B8AD9E", borderRadius:16, padding:"18px", textAlign:"center", cursor:"pointer", marginBottom:20, background:"rgba(255,255,255,0.3)" }}>
                  <input ref={fileRef} type="file" accept=".csv" style={{ display:"none" }} onChange={e => e.target.files[0] && handleFile(e.target.files[0])} />
                  <div style={{ fontSize:20, marginBottom:4 }}>📂</div>
                  <div style={{ fontSize:12, color:"#6B5E4A" }}>Drop CSV bank statement here</div>
                  <div style={{ fontSize:10, color:"#9E907A", marginTop:3 }}>Auto-matched with Splitwise</div>
                  {uploadMsg && <div style={{ marginTop:8, fontSize:11, color:"#2D5A3D" }}>{uploadMsg}</div>}
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                  {CATEGORIES.map((c, i) => {
                    const spent  = categorySpend[c.id] || 0;
                    const budget = budgets[c.id];
                    const over   = spent > budget;
                    return (
                      <div key={c.id} className="card" style={{ background:"rgba(255,255,255,0.55)", borderRadius:16, padding:"14px 16px", animationDelay:`${i*0.06}s`, border: over ? "1.5px solid #E8C5C0" : "1.5px solid rgba(255,255,255,0.6)" }}>
                        <div style={{ fontSize:18, marginBottom:6 }}>{c.icon}</div>
                        <div style={{ fontSize:10, color:"#8A7A68", letterSpacing:"0.06em", marginBottom:4 }}>{c.label.split(" ")[0].toUpperCase()}</div>
                        <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:20, color: over ? "#C0392B" : "#2A2219" }}>${spent.toFixed(0)}</div>
                        <div style={{ fontSize:9, color:"#9E907A" }}>of ${budget}</div>
                        <SpendBar spent={spent} budget={budget} color={c.color} />
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* SPLITWISE */}
            {activeTab === "splitwise" && (
              <SplitwisePanel
                apiKey={apiKey} setApiKey={setApiKey}
                yourId={yourId} setYourId={setYourId}
                emilyId={emilyId} setEmilyId={setEmilyId}
                onSync={handleSync} syncing={syncing} syncStatus={syncStatus}
                filteredTx={filteredTx} totalRaw={totalRaw} totalSpent={totalSpent} totalSaved={totalSaved}
              />
            )}

            {/* LEDGER */}
            {activeTab === "ledger" && (
              <div className="card">
                <div style={{ marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div style={{ fontSize:11, color:"#8A7A68", letterSpacing:"0.08em" }}>{filteredTx.length} TRANSACTIONS</div>
                  <div style={{ fontSize:11, color:"#2D5A3D" }}>${totalSpent.toFixed(2)} actual</div>
                </div>
                <div style={{ background:"rgba(255,255,255,0.55)", borderRadius:16, overflow:"hidden", border:"1.5px solid rgba(255,255,255,0.6)" }}>
                  {[...filteredTx].sort((a,b) => new Date(b.date)-new Date(a.date)).map((tx, i) => {
                    const cat       = CATEGORIES.find(c => c.id === tx.category);
                    const effective = eff(tx);
                    return (
                      <div key={tx.id} className="tx-row" style={{ padding:"12px 18px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:12, borderBottom: i < filteredTx.length-1 ? "1px solid rgba(200,191,176,0.4)" : "none", transition:"background 0.15s" }}>
                        <div style={{ display:"flex", gap:10, alignItems:"flex-start", flex:1, minWidth:0 }}>
                          <span style={{ fontSize:15, flexShrink:0, marginTop:2 }}>{cat ? cat.icon : "💳"}</span>
                          <div style={{ minWidth:0 }}>
                            <div style={{ fontSize:12, color:"#2A2219", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{tx.desc}</div>
                            <div style={{ fontSize:9, color:"#9E907A", marginTop:2 }}>{tx.date} · {tx.person}</div>
                            {tx.splitwiseId && <Badge tx={tx} />}
                          </div>
                        </div>
                        <div style={{ textAlign:"right", flexShrink:0 }}>
                          <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:17, color:"#2A2219" }}>${effective.toFixed(2)}</div>
                          {tx.adjustedAmount != null && tx.adjustedAmount !== tx.amount && (
                            <div style={{ fontSize:9, color:"#9E907A", textDecoration:"line-through" }}>${tx.amount.toFixed(2)}</div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ADVISOR */}
            {activeTab === "advisor" && (
              <div className="card">
                <div style={{ background:"rgba(255,255,255,0.55)", borderRadius:16, padding:"24px 20px", marginBottom:16, border:"1.5px solid rgba(255,255,255,0.6)", textAlign:"center" }}>
                  <div style={{ fontSize:32, marginBottom:10 }}>🌿</div>
                  <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:20, color:"#2A2219", marginBottom:8, fontStyle:"italic" }}>Your Personal Advisor</div>
                  <div style={{ fontSize:12, color:"#8A7A68", lineHeight:1.7 }}>Powered by Splitwise-adjusted figures — your real spend, not raw card totals.</div>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:16 }}>
                  {[
                    { label:"Transactions", val:filteredTx.length },
                    { label:"Adjusted",     val:splitwiseCount },
                    { label:"Over Budget",  val:CATEGORIES.filter(c => (categorySpend[c.id]||0) > budgets[c.id]).length },
                  ].map(s => (
                    <div key={s.label} style={{ background:"rgba(255,255,255,0.55)", borderRadius:12, padding:"12px", textAlign:"center", border:"1.5px solid rgba(255,255,255,0.6)" }}>
                      <div style={{ fontFamily:"'Crimson Pro',serif", fontSize:24, color:"#2A2219" }}>{s.val}</div>
                      <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.06em" }}>{s.label.toUpperCase()}</div>
                    </div>
                  ))}
                </div>
                <AIAdvisor transactions={filteredTx} budgets={budgets} categorySpend={categorySpend} />
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
