  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect, useMemo } = React;

    // ─────────────────────────────────────────────────────────────────────────

    // ─────────────────────────────────────────────────────────────────────────

      { id:"s-5",  desc:"Electricity Bill",   amount:98.20,  adjustedAmount:null, category:"rent",          date:`${CURRENT_MONTH}-04`, person:"Joint",  splitwiseId:null },
      { id:"s-6",  desc:"Zara",               amount:89.95,  adjustedAmount:null, category:"shopping",      date:`${CURRENT_MONTH}-05`, person:"Emily",  splitwiseId:null },

      { id:"s-10", desc:"Uber",               amount:19.80,  adjustedAmount:null, category:"transport",     date:`${CURRENT_MONTH}-09`, person:"Emily",  splitwiseId:null },
      { id:"s-11", desc:"Movie night for 3",  amount:94.50,  adjustedAmount:31.5, category:"entertainment", date:`${CURRENT_MONTH}-10`, person:"Aldrin", splitwiseId:"sw-demo-3" },
      { id:"s-12", desc:"Whole Foods",        amount:94.20,  adjustedAmount:null, category:"groceries",     date:`${CURRENT_MONTH}-11`, person:"Joint",  splitwiseId:null },
      { id:"s-13", desc:"Amazon Prime",       amount:8.99,   adjustedAmount:null, category:"entertainment", date:`${CURRENT_MONTH}-12`, person:"Joint",  splitwiseId:null },
      { id:"s-14", desc:"ASOS",               amount:145,    adjustedAmount:null, category:"shopping",      date:`${CURRENT_MONTH}-13`, person:"Aldrin", splitwiseId:null },

    // ─────────────────────────────────────────────────────────────────────────
    // UTILITY FUNCTIONS
    // ─────────────────────────────────────────────────────────────────────────

    /** Returns the effective (Splitwise-adjusted) amount for a transaction */
    function getEffectiveAmount(tx) {
      return tx.adjustedAmount != null ? tx.adjustedAmount : tx.amount;
    }

    /** Guesses a category ID from a transaction description */
    function guessCategory(desc) {
      const d = (desc || "").toLowerCase();
      if (/grocery|whole foods|trader joe|kroger|safeway|restaurant|cafe|coffee|pizza|burger|sushi|doordash|ubereats|grubhub|deliveroo|starbucks|chipotle|mcdonald/.test(d)) return "groceries";
      if (/netflix|spotify|hulu|disney|hbo|apple tv|amazon prime|cinema|movie|theater|gaming|steam/.test(d))                                                                   return "entertainment";
      if (/uber|lyft|taxi|metro|subway|train|flight|airline|delta|united|southwest|airbnb|hotel|parking|gas station|shell/.test(d))                                            return "transport";
      if (/rent|mortgage|electricity|electric|gas bill|water|internet|broadband|utility|insurance/.test(d))                                                                    return "rent";
      if (/vanguard|fidelity|schwab|401k|ira|invest|stock|etf|savings/.test(d))                                                                                               return "savings";
      if (/amazon|asos|zara|h&m|gap|nike|apple store|best buy|walmart|shopping|clothes/.test(d))                                                                              return "shopping";
      return "shopping"; // Fix: fallback to shopping not groceries
    }

    /**
     * Parses a CSV bank statement into transaction objects.
     * Handles quoted fields containing commas (Fix #8).
     */
    function parseCSV(text) {
      // Proper CSV field parser that handles quoted commas
      function parseCSVLine(line) {
        const fields = [];
        let current = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            inQuotes = !inQuotes;
          } else if (ch === "," && !inQuotes) {
            fields.push(current.trim());
            current = "";
          } else {
            current += ch;
          }
        }
        fields.push(current.trim());
        return fields;
      }

      const lines = text.trim().split("\n").filter(l => l.trim());
      if (lines.length < 2) return [];
      const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase());

      return lines.slice(1).map((line, i) => {
        const vals = parseCSVLine(line);
        const obj  = {};
        headers.forEach((h, idx) => { obj[h] = vals[idx] || ""; });

        const amount = parseFloat(obj.amount || obj.debit || obj.credit || 0);
        const desc   = obj.description || obj.desc || obj.merchant || obj.narrative || "Unknown";
        const date   = obj.date || now.toISOString().split("T")[0];

        if (!amount || isNaN(amount)) return null;
        return {
          id: `csv-${Date.now()}-${i}`, // string ID (Fix #3)
          desc,
          amount: Math.abs(amount),
          adjustedAmount: null,
          category: guessCategory(desc),
          date,
          person: "Imported",
          splitwiseId: null,
          manualEntry: false,
        };
      }).filter(Boolean);
    }

    /**
     * Matches CSV-imported transactions against Splitwise expenses
     * and applies adjusted amounts where descriptions/dates align.
     * Tolerance: amount within $1, date within 3 days.
     */
    function matchAndAdjust(transactions, splitwiseExpenses) {
      if (!splitwiseExpenses.length) return transactions;
      return transactions.map(tx => {
        const match = splitwiseExpenses.find(sw => {
          const daysDiff = Math.abs((new Date(sw.date) - new Date(tx.date)) / 86400000);
          return (
            Math.abs(sw.totalCost - tx.amount) < CSV_AMOUNT_TOLERANCE_USD &&
            daysDiff <= CSV_DATE_TOLERANCE_DAYS
          );
        });
        return match
          ? { ...tx, adjustedAmount: match.yourShare, splitwiseId: `sw-${match.id}` }
          : tx;
      });
    }

    /** localStorage helpers */
    function lsGet(key, fallback) {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
    }
    function lsSet(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    }

    // ─────────────────────────────────────────────────────────────────────────
    // FIREBASE HELPERS
    // Shared data lives in Firestore under one document per collection.
    // Transactions and budgets are shared (both users read/write).
    // Credentials (API key, SW user ID) stay local — never sent to Firestore.
    // Sync timestamps are written per-user so each person can see the other's.
    // ─────────────────────────────────────────────────────────────────────────

    const FB_DOC = {
      transactions: () => window.__fs.doc(window.__db, "shared", "transactions"),
      budgets:      () => window.__fs.doc(window.__db, "shared", "budgets"),
      syncMeta:     (uid) => window.__fs.doc(window.__db, "syncMeta", uid),
      income:       () => window.__fs.doc(window.__db, "shared", "income"),
      rules:        () => window.__fs.doc(window.__db, "shared", "categoryRules"),
    };

    // ── DEFAULT INCOME ──────────────────────────────────────────────────────
    const DEFAULT_INCOME = { aldrin: 0, emily: 0 };

    // ── RECURRING DETECTION ─────────────────────────────────────────────────
    // A transaction is recurring if the same description appears in 2+ distinct
    // calendar months. Returns array of { desc, category, avgAmount, person }.
    function detectRecurring(transactions) {
      const byDesc = {};
      transactions.forEach(tx => {
        const month = (tx.date || "").slice(0, 7);
        if (!byDesc[tx.desc]) byDesc[tx.desc] = { months: new Set(), tx };
        byDesc[tx.desc].months.add(month);
      });
      return Object.entries(byDesc)
        .filter(([, v]) => v.months.size >= 2)
        .map(([desc, v]) => ({
          desc,
          category: v.tx.category,
          person:   v.tx.person,
          avgAmount: transactions
            .filter(t => t.desc === desc)
            .reduce((s, t, _, a) => s + getEffectiveAmount(t) / a.length, 0),
        }));
    }

    // ── CASH FLOW CHART ──────────────────────────────────────────────────────
    // Returns last 6 months of { month, label, income, spend, net } data
    function buildCashFlow(transactions, income) {
      return Array.from({ length: 6 }, (_, i) => {
        const d     = new Date(now.getFullYear(), now.getMonth() - (5 - i), 1);
        const month = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
        const label = d.toLocaleString("en-US", { month: "short" });
        const spend = transactions
          .filter(t => (t.date||"").startsWith(month))
          .reduce((s, t) => s + getEffectiveAmount(t), 0);
        const totalIncome = (income.aldrin || 0) + (income.emily || 0);
        return { month, label, income: totalIncome, spend, net: totalIncome - spend };
      });
    }

    async function fbSet(docRef, data) {
      try { await window.__fs.setDoc(docRef, data, { merge: true }); } catch(e) { console.warn("Firestore write failed:", e); }
    }

    async function fbGet(docRef, fallback) {
      try {
        const snap = await window.__fs.getDoc(docRef);
        return snap.exists() ? snap.data() : fallback;
      } catch(e) { console.warn("Firestore read failed:", e); return fallback; }
    }

    function fbListen(docRef, callback) {
      try { return window.__fs.onSnapshot(docRef, snap => { if (snap.exists()) callback(snap.data()); }); }
      catch(e) { console.warn("Firestore listener failed:", e); return () => {}; }
    }

    // ─────────────────────────────────────────────────────────────────────────
    // SPLITWISE API
    // ─────────────────────────────────────────────────────────────────────────

    /**
     * Fetches last 12 months of Splitwise expenses.
     * Returns structured expense objects with Emily-presence flag.
     * Throws descriptive errors for common HTTP failures (Fix #6).
     */
    async function fetchSplitwise(apiKey, yourUserId) {
      const since = new Date();
      since.setMonth(since.getMonth() - 11);
      since.setDate(1);
      const datedAfter = since.toISOString().split("T")[0];

      const res = await fetch(
        `${PROXY_URL}/splitwise/get_expenses?limit=500&dated_after=${datedAfter}`,
        { headers: { "x-splitwise-key": apiKey } }
      );

      // Descriptive error messages per status code
      if (res.status === 401) throw new Error("Invalid API key — check your Splitwise credentials");
      if (res.status === 429) throw new Error("Too many requests — wait a moment and try again");
      if (res.status === 500) throw new Error("Splitwise server error — try again later");
      if (!res.ok)            throw new Error(`Unexpected error (status ${res.status})`);

      const data = await res.json();
      return (data.expenses || [])
        .filter(e => !e.payment && !e.deleted_at)
        .map(e => {
          const users         = e.users || [];
          const me            = users.find(u => u.user_id === yourUserId);
          const emilyOnExpense = users.some(u => u.user_id === EMILY_SW_ID && parseFloat(u.owed_share) > 0);
          return {
            id:             String(e.id), // string ID (Fix #3)
            description:    e.description,
            date:           (e.date || "").split("T")[0],
            totalCost:      parseFloat(e.cost) || 0,
            yourShare:      parseFloat(me?.owed_share) || 0,
            paidByYou:      parseFloat(me?.paid_share) > 0,
            emilyOnExpense,
          };
        })
        .filter(e => e.yourShare > 0);
    }

    // ─────────────────────────────────────────────────────────────────────────
    // SHARED UI COMPONENTS
    // ─────────────────────────────────────────────────────────────────────────

    /** Progress bar — single or stacked (me + other) depending on filter */
    function SpendBar({ spent, budget, color, filterPerson, meSpent, otherSpent, meBarColor, otherBarColor }) {
      // Fix #10: renamed MC→meBarColor, OC→otherBarColor, emilySpent→otherSpent
      const MC   = meBarColor    || "#4A7C8E";
      const OC   = otherBarColor || "#A0785A";
      const over = spent > budget;

      if (filterPerson === "Joint" || filterPerson === "All") {
        const mePct    = budget > 0 ? Math.min(((meSpent    || 0) / budget) * 100, 100) : 0;
        const otherPct = budget > 0 ? Math.min(((otherSpent || 0) / budget) * 100, 100 - mePct) : 0;
        return (
          <div style={{ background:"#E8E0D4", borderRadius:99, height:8, overflow:"hidden", marginTop:8, display:"flex" }}>
            <div style={{ height:"100%", width:`${mePct}%`,    background: over ? "#C0392B" : MC, transition:"width 0.8s cubic-bezier(.4,0,.2,1)", borderRadius: otherPct > 0 ? "99px 0 0 99px" : 99 }} />
            <div style={{ height:"100%", width:`${otherPct}%`, background: over ? "#E05050" : OC, transition:"width 0.8s cubic-bezier(.4,0,.2,1)", borderRadius: mePct    > 0 ? "0 99px 99px 0" : 99 }} />
          </div>
        );
      }

      const barColor = (filterPerson && filterPerson !== "All" && filterPerson !== "Me" && filterPerson !== "Joint") ? OC : (filterPerson === "Me" ? MC : color);
      const pct      = budget > 0 ? Math.min((spent / budget) * 100, 100) : 0;
      return (
        <div style={{ background:"#E8E0D4", borderRadius:99, height:8, overflow:"hidden", marginTop:8 }}>
          <div style={{ height:"100%", borderRadius:99, width:`${pct}%`, background: over ? "#C0392B" : barColor, transition:"width 0.8s cubic-bezier(.4,0,.2,1)" }} />
        </div>
      );
    }

    /** Splitwise savings badge shown on transaction rows */
    function SplitBadge({ tx }) {
      if (!tx.splitwiseId) return null;
      const saved = (tx.amount - getEffectiveAmount(tx)).toFixed(2);
      return (
        <span style={{ display:"inline-flex", alignItems:"center", gap:4, background:"#EAF4ED", color:"#2D5A3D", borderRadius:99, fontSize:9, padding:"2px 7px", fontWeight:500, marginTop:3 }}>
          ⚡ Splitwise · saved ${saved}
        </span>
      );
    }

    /** Brief toast notification */
    function Toast({ message }) {
      if (!message) return null;
      return <div className="toast">{message}</div>;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // SPLITWISE PANEL
    // ─────────────────────────────────────────────────────────────────────────

    function SplitwisePanel({ apiKey, setApiKey, yourId, setYourId, onSync, syncing, syncStatus, myLastSynced, otherLastSynced, myName, otherName, filteredTx, totalRaw, totalSpent, totalSaved }) {

          <div onClick={() => setOpen(o => !o)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background: configured ? "#EAF4ED" : "#FDF5EC", border:`1.5px solid ${configured ? "#A8D5B5" : "#E8C87A"}`, borderRadius: open ? "14px 14px 0 0" : 14, padding:"14px 16px", cursor:"pointer" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:20 }}>⚡</span>
              <div>
                <div style={{ fontSize:12, color:"#2A2219", fontWeight:500 }}>Splitwise Integration</div>
                <div style={{ fontSize:10, color: configured ? "#2D5A3D" : "#8A6A2A" }}>
                  {configured
                    ? myLastSynced ? `Your last sync: ${myLastSynced}` : "Connected · tap to sync"
                    : "Not configured · tap to set up"}
                </div>
                {(myLastSynced || otherLastSynced) && (
                  <div style={{ fontSize:9, color:"#9E907A", marginTop:2 }}>
                    {otherLastSynced ? `${otherName} synced: ${otherLastSynced}` : `${otherName} hasn't synced yet`}
                  </div>
                )}
              </div>
            </div>
            <span style={{ fontSize:13, color:"#9E907A" }}>{open ? "▲" : "▼"}</span>
          </div>

          {/* Credentials + sync */}
          {open && (
            <div style={{ background:"rgba(255,255,255,0.7)", borderRadius:"0 0 14px 14px", border:"1.5px solid #D5CAB8", borderTop:"none", padding:"16px", marginBottom:16 }}>
              <div style={{ fontSize:11, color:"#6B5E4A", lineHeight:1.7, marginBottom:14 }}>
                Enter your Splitwise credentials to auto-adjust shared expenses.{" "}
                <a href="https://secure.splitwise.com/api/v3.0/get_current_user" target="_blank" rel="noreferrer" style={{ color:"#2D5A3D" }}>Find your user ID ↗</a>
              </div>

              {/* API Key — masked by default (Fix #12) */}
              <div style={{ marginBottom:12 }}>
                <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.1em", marginBottom:4 }}>API KEY</div>
                <div style={{ position:"relative" }}>
                  <input
                    type={showApiKey ? "text" : "password"}
                    value={apiKey || ""}
                    onChange={e => setApiKey(e.target.value)}
                    placeholder="Paste your Splitwise API key..."
                    style={{ width:"100%", padding:"8px 40px 8px 12px", borderRadius:8, border:"1.5px solid #D5CAB8", background:"#FAF7F2", fontFamily:"'DM Mono',monospace", color:"#2A2219", outline:"none" }}
                  />
                  <button onClick={() => setShowApiKey(s => !s)} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", fontSize:14, color:"#9E907A" }}>
                    {showApiKey ? "🙈" : "👁️"}
                  </button>
                </div>
              </div>

              {/* User ID */}
              <div style={{ marginBottom:12 }}>
                <div style={{ fontSize:9, color:"#9E907A", letterSpacing:"0.1em", marginBottom:4 }}>YOUR USER ID</div>
                <input
                  value={yourId || ""}
                  onChange={e => setYourId(e.target.value ? parseInt(e.target.value) : null)}
                  placeholder="e.g. 12345678"

    // ─────────────────────────────────────────────────────────────────────────
    // AI ADVISOR
    // ─────────────────────────────────────────────────────────────────────────

    function AIAdvisor({ transactions, budgets, categorySpend, income, recurring }) {
      const [messages,    setMessages]    = useState([]);
      const [input,       setInput]       = useState("");
      const [loading,     setLoading]     = useState(false);
      const [briefOpen,   setBriefOpen]   = useState(false);
      const [brief,       setBrief]       = useState("");
      const [briefLoading,setBriefLoading]= useState(false);
      const chatEndRef = useRef(null);

      const swSavings   = transactions.reduce((sum, t) => sum + (t.splitwiseId ? (t.amount - getEffectiveAmount(t)) : 0), 0);
      const totalSpent  = transactions.reduce((sum, t) => sum + getEffectiveAmount(t), 0);
      const totalBudget = CATEGORIES.reduce((sum, c) => sum + (budgets[c.id] || c.budget), 0);
      const totalIncome = (income.aldrin || 0) + (income.emily || 0);

      const buildContext = () => {
        const catSummary = CATEGORIES.map(c => {
          const spent = transactions.filter(t => t.category === c.id).reduce((s, t) => s + getEffectiveAmount(t), 0);
          return `${c.label}: $${spent.toFixed(0)} of $${budgets[c.id] || c.budget}`;
        }).join("; ");
        const recurringSummary = recurring.slice(0, 5).map(r => `${r.desc} (~$${r.avgAmount.toFixed(0)})`).join(", ");
        return `Financial context for Aldrin & Emily: combined income $${totalIncome}/mo, adjusted spend $${totalSpent.toFixed(0)} vs $${totalBudget} budget, Splitwise saved $${swSavings.toFixed(0)}. Categories: ${catSummary}. Recurring bills: ${recurringSummary || "none detected"}.`;
      };

      const SYSTEM = `You are a warm, supportive personal financial advisor for Aldrin and Emily — a couple managing shared finances. All spend figures are Splitwise-adjusted (real shares, not raw totals). Be conversational, specific, and encouraging. Never shame. Keep replies under 150 words unless asked for detail. Use plain language.`;

      const getBrief = async () => {
        setBriefLoading(true); setBriefOpen(true);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514", max_tokens: 1000,
              system: SYSTEM,
              messages: [{ role: "user", content: `${buildContext()} Give a brief overall financial health check — 3 bullet observations and 1 forward-looking tip.` }]
            })
          });
          const data = await res.json();
          setBrief(data.content?.map(b => b.text).join("") || "Couldn't load brief.");
        } catch { setBrief("Couldn't connect — try again."); }
        setBriefLoading(false);
      };

      const sendMessage = async () => {
        const text = input.trim();
        if (!text || loading) return;
        const userMsg = { role: "user", content: text };
        const newMessages = [...messages, userMsg];
        setMessages(newMessages);
        setInput("");
        setLoading(true);
        setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: "smooth" }), 50);
        try {
          const contextMsg = { role: "user", content: buildContext() };
          const apiMessages = messages.length === 0
            ? [contextMsg, userMsg]
            : [contextMsg, ...newMessages];
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: SYSTEM, messages: apiMessages })
          });
          const data = await res.json();
          const reply = data.content?.map(b => b.text).join("") || "Couldn't respond — try again.";
          setMessages(prev => [...prev, { role: "assistant", content: reply }]);
        } catch { setMessages(prev => [...prev, { role: "assistant", content: "Couldn't connect — please try again." }]); }
        setLoading(false);
        setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
      };

      const SUGGESTIONS = [
        "How are we doing this month?",
        "Where are we overspending?",
        "How much have we saved via Splitwise?",
        "What should we cut back on?",
      ];

      return (
        <div>
          {/* Brief overview button */}
          <button onClick={getBrief} disabled={briefLoading} style={{ background:"#2D5A3D", color:"#F5F0E8", border:"none", borderRadius:12, padding:"13px 24px", fontFamily:"'DM Mono',monospace", fontSize:13, cursor: briefLoading ? "not-allowed" : "pointer", letterSpacing:"0.05em", width:"100%", opacity: briefLoading ? 0.7 : 1, marginBottom:12 }}>
            {briefLoading ? "Reviewing your finances..." : "✦ Get Financial Overview"}
          </button>

          {briefOpen && (
            <div style={{ marginBottom:16, background:"#F0EBE1", borderRadius:16, padding:"18px 20px", borderLeft:"3px solid #2D5A3D", fontFamily:"'Crimson Pro',Georgia,serif", fontSize:15, lineHeight:1.8, color:"#2A2219", whiteSpace:"pre-wrap" }}>
              {briefLoading
                ? <span style={{ color:"#6B5E4A" }}>◌ Reviewing...</span>
                : brief}
            </div>
          )}

          {/* Chat interface */}
          <div style={{ background:"rgba(255,255,255,0.55)", borderRadius:16, border:"1.5px solid rgba(255,255,255,0.6)", overflow:"hidden" }}>
            {/* Chat header */}
            <div style={{ padding:"12px 16px", borderBottom:"1px solid rgba(200,191,176,0.3)", display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:16 }}>💬</span>
              <span style={{ fontSize:11, color:"#6B5E4A", letterSpacing:"0.06em" }}>ASK ANYTHING ABOUT YOUR FINANCES</span>
            </div>

            {/* Messages */}
            <div style={{ padding:"12px 16px", minHeight:120, maxHeight:320, overflowY:"auto" }}>
              {messages.length === 0 && (
                <div>
                  <div style={{ fontSize:11, color:"#9E907A", marginBottom:10 }}>Try asking:</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                    {SUGGESTIONS.map(s => (
                      <button key={s} onClick={() => { setInput(s); }}
                        style={{ padding:"6px 12px", borderRadius:99, border:"1.5px solid #D5CAB8", background:"#FAF7F2", fontSize:10, color:"#6B5E4A", cursor:"pointer", fontFamily:"'DM Mono',monospace" }}>
                        {s}
                      </button>
                    ))}
                  </div>
                </div>
              )}
              {messages.map((m, i) => (
                <div key={i} style={{ marginBottom:12, display:"flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
                  <div style={{
                    maxWidth:"85%", padding:"10px 14px", borderRadius: m.role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
                    background: m.role === "user" ? "#2D5A3D" : "#F0EBE1",
                    color: m.role === "user" ? "#F5F0E8" : "#2A2219",
                    fontSize: m.role === "user" ? 12 : 14,
                    fontFamily: m.role === "user" ? "'DM Mono',monospace" : "'Crimson Pro',serif",
                    lineHeight: 1.6, whiteSpace:"pre-wrap",
                  }}>{m.content}</div>
                </div>
              ))}
              {loading && (
                <div style={{ display:"flex", gap:8, alignItems:"center", color:"#9E907A", fontSize:12 }}>
                  <span style={{ animation:"spin 1s linear infinite", display:"inline-block" }}>◌</span> Thinking...
                </div>
              )}
              <div ref={chatEndRef} />
            </div>

            {/* Input row */}
            <div style={{ borderTop:"1px solid rgba(200,191,176,0.3)", padding:"10px 12px", display:"flex", gap:8 }}>
              <input
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key === "Enter" && sendMessage()}
                placeholder="Ask about your spending..."
                style={{ flex:1, padding:"9px 12px", borderRadius:10, border:"1.5px solid #D5CAB8", background:"#FAF7F2", fontFamily:"'DM Mono',monospace", color:"#2A2219", outline:"none" }}
              />
              <button onClick={sendMessage} disabled={loading || !input.trim()}
                style={{ padding:"9px 16px", borderRadius:10, border:"none", background: loading || !input.trim() ? "#9AB5A0" : "#2D5A3D", color:"#F5F0E8", fontFamily:"'DM Mono',monospace", fontSize:12, cursor: loading || !input.trim() ? "not-allowed" : "pointer" }}>
                ↑
              </button>
            </div>
          </div>
        </div>
      );
    }

    // APP SHELL

    function App() {
      const [userId, setUserId] = useState(() => lsGet("finance_user", null));
      const selectUser = id => { lsSet("finance_user", id); setUserId(id); };
      // Switch directly to a specific user — no landing screen
      const switchUser = id => { lsSet("finance_user", id); setUserId(id); };
